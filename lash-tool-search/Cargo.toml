[package]
name = "lash-tool-search"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
default = []
fff-zlob = ["fff-search/zlob"]

[dependencies]
lash = { path = "../lash", default-features = false }
lash-tool-support = { path = "../lash-tool-support" }
async-trait = "0.1"
fff-search = { version = "0.6.2-nightly.a677d64", default-features = false }
regex = "1"
serde_json = "1"
tokio = { version = "1", features = ["rt", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
tempfile = "3"

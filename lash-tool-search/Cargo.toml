[package]
name = "lash-tool-search"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
default = []
fff-zlob = ["fff-search/zlob"]

[dependencies]
lash = { path = "../lash", default-features = false }
lash-tool-support = { path = "../lash-tool-support" }
async-trait = { workspace = true }
fff-search = { version = "0.6.2-nightly.a677d64", default-features = false }
regex = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash = { path = "../lash", default-features = false, features = ["testing"] }
tempfile = { workspace = true }

[package]
name = "lash-trace"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
default = []
otel = ["dep:opentelemetry"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
opentelemetry = { version = "0.31", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }

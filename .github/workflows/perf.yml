name: Performance

# The heavyweight performance guard deliberately does NOT run per push (see
# ci.yml); this nightly run is the sole enforcement point for the budgets in
# scripts/perf_guard_budgets.json — without it the budget system gates
# nothing.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  perf-guard-full:
    name: Perf Guard Full
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # Restore-only against the release cache ci.yml warms on main.
          shared-key: linux-release
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run full performance guard
        run: |
          python3 scripts/profile_guard.py --profile full --release --cargo-feature fff-zlob --enforce --out .benchmarks/perf-guard/full.json

      - name: Publish performance guard summary
        run: |
          python3 scripts/perfreport.py .benchmarks/perf-guard/full.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard-full
          path: .benchmarks/perf-guard/*
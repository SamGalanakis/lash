name: Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  perf-guard-full:
    name: Perf Guard Full
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: scripts/ci-install-apt-packages.sh protobuf-compiler

      - name: Run full performance guard
        run: |
          python3 scripts/profile_guard.py --profile full --release --cargo-feature fff-zlob --enforce --out .benchmarks/perf-guard/full.json

      - name: Publish performance guard summary
        run: |
          python3 scripts/perfreport.py .benchmarks/perf-guard/full.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard-full
          path: .benchmarks/perf-guard/*

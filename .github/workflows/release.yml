name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish (for example v0.2.11)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-release-ref:
    name: Validate release ref
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate locked workspace metadata
        run: cargo metadata --format-version 1 --locked >/dev/null

  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: validate-release-ref
    # CARGO_REGISTRY_TOKEN lives in the `main` GitHub Environment; a job must
    # declare the environment to read its secrets.
    environment: main
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      # Gate the (irreversible) publish on the same core tests CI runs.
      - name: Test core crates
        run: |
          cargo test -p lash-sansio --locked
          cargo test -p lash-core --locked
          cargo test -p lash-turso-store --locked
          cargo test -p lash-runtime --locked
          cargo test -p lash-standard-plugins --locked --features fff-zlob

      # Publishes every publishable workspace member in dependency order,
      # waiting for index propagation between crates. publish=false crates are
      # skipped; versions already on crates.io are skipped (so reruns resume).
      #
      # Auth: a crates.io API token in the CARGO_REGISTRY_TOKEN secret. This is
      # required for the *first* publish of brand-new crates, because crates.io
      # Trusted Publishing can only be configured on a crate that already
      # exists. Once every crate has been published once and a trusted
      # publisher (repo + this workflow) is configured for each, switch to
      # OIDC by adding `id-token: write` to this job's permissions, a
      # `rust-lang/crates-io-auth-action@v1` step (id: auth), and setting
      # CARGO_REGISTRY_TOKEN to `${{ steps.auth.outputs.token }}` — then the
      # long-lived secret can be removed.
      - name: Publish workspace to crates.io
        run: cargo publish --workspace --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-release-assets:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    needs: validate-release-ref

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lash-linux-x86_64.tar.gz
            linker: ""
            apt_packages: protobuf-compiler
            brew_packages: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lash-linux-aarch64.tar.gz
            linker: aarch64-linux-gnu-gcc
            apt_packages: protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            brew_packages: ""
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: lash-macos-aarch64.tar.gz
            linker: ""
            apt_packages: ""
            brew_packages: protobuf llvm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.brew_packages }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

      - name: Package release artifact
        run: scripts/package-release.sh ${{ matrix.target }} ${{ matrix.asset_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-assets
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: lash-*.tar.gz
          merge-multiple: true

      - name: Prepare installer asset
        run: scripts/render-installer.sh "${RELEASE_TAG}" dist/install_lash.sh

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum lash-*.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release-assets:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lash-linux-x86_64.tar.gz
            linker: ""
            apt_packages: protobuf-compiler
            brew_packages: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lash-linux-aarch64.tar.gz
            linker: aarch64-linux-gnu-gcc
            apt_packages: protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            brew_packages: ""
          - os: macos-14
            target: x86_64-apple-darwin
            asset_name: lash-macos-x86_64.tar.gz
            linker: ""
            apt_packages: ""
            brew_packages: protobuf llvm
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: lash-macos-aarch64.tar.gz
            linker: ""
            apt_packages: ""
            brew_packages: protobuf llvm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.brew_packages }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release -p lash-cli --target ${{ matrix.target }}

      - name: Package release artifact
        run: scripts/package-release.sh ${{ matrix.target }} ${{ matrix.asset_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-assets
    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: lash-*.tar.gz
          merge-multiple: true

      - name: Prepare installer asset
        run: scripts/render-installer.sh "${RELEASE_TAG}" dist/install_lash.sh

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum lash-*.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

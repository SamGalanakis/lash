name: Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Commit on main to release (blank uses the current main head)"
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: lash-release-main
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare manual release
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}
      release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out main with release history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve and validate release commit
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          git fetch --force origin main --tags

          requested="${REQUESTED_SHA:-origin/main}"
          sha="$(git rev-parse "${requested}^{commit}")"
          if ! git merge-base --is-ancestor "${sha}" origin/main; then
            echo "Release commit ${sha} is not on main." >&2
            exit 1
          fi

          runs_file="$(mktemp)"
          gh run list --workflow ci.yml --commit "${sha}" --limit 20 \
            --json conclusion,event,headSha,status > "${runs_file}"
          python3 - "${sha}" "${runs_file}" <<'PY'
          import json
          import pathlib
          import sys

          sha = sys.argv[1]
          runs = json.loads(pathlib.Path(sys.argv[2]).read_text(encoding="utf-8"))
          if not any(
              run.get("headSha") == sha
              and run.get("event") == "push"
              and run.get("status") == "completed"
              and run.get("conclusion") == "success"
              for run in runs
          ):
              raise SystemExit(f"no successful main CI push run found for {sha}")
          PY

          git checkout --detach "${sha}"
          tag="$(git tag --points-at "${sha}" --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "${tag}" ]; then
            python3 scripts/release_notes.py collect --require --end "${sha}" >/dev/null
            version="$(python3 scripts/release_version.py print-next)"
            tag="v${version}"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Computed release tag ${tag} already exists on another commit." >&2
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${tag}" "${sha}"
            git push origin "${tag}"
          fi

          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Preparing ${tag} from ${sha}." >> "${GITHUB_STEP_SUMMARY}"

  validate-release-ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate locked workspace metadata
        run: cargo metadata --format-version 1 --locked >/dev/null

  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: [prepare-release, validate-release-ref, perf-guard-full]
    # CARGO_REGISTRY_TOKEN lives in the `main` GitHub Environment; a job must
    # declare the environment to read its secrets.
    environment: main
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Check out release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          path: .release-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Publishes every publishable workspace member in topological dependency
      # layers (crates within a layer publish concurrently under a conservative
      # cap; the publisher waits for crates.io API visibility once per layer).
      # publish=false crates are skipped; versions already visible on crates.io
      # are skipped, so reruns resume after partial publication.
      #
      # --version stamps the real release version into the tag checkout's
      # manifests + lockfile before reading the graph and publishing: `main`
      # carries the 0.0.0-dev placeholder, so this is what makes the published
      # crates pin the real version. The stamp runs the tag checkout's own
      # scripts/release_version.py (the publisher script itself is the pinned
      # `.release-tools` copy).
      #
      # --no-verify: skip the per-crate verify-build. It is both unnecessary and
      # broken here — the release is cut from a fully CI-tested `main`, and the
      # verify-build compiles fff-search through the CLI-only lash-search-tools
      # crate. Its build.rs panics under CI unless the non-default, zig-backed
      # `zlob` feature is enabled. Skipping verification packages + uploads the
      # already-built code directly, needing no compile toolchain.
      #
      # Auth: a crates.io API token in the CARGO_REGISTRY_TOKEN secret. This is
      # required for the *first* publish of brand-new crates, because crates.io
      # Trusted Publishing can only be configured on a crate that already
      # exists. Once every crate has been published once and a trusted
      # publisher (repo + this workflow) is configured for each, switch to
      # OIDC by adding `id-token: write` to this job's permissions, a
      # `rust-lang/crates-io-auth-action@v1` step (id: auth), and setting
      # CARGO_REGISTRY_TOKEN to `${{ steps.auth.outputs.token }}` — then the
      # long-lived secret can be removed.
      - name: Publish workspace to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: python3 .release-tools/scripts/publish_workspace.py --version "${RELEASE_TAG#v}"

  perf-guard-full:
    name: Perf Guard Full
    runs-on: ubuntu-latest
    needs: [prepare-release, validate-release-ref]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-release
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run full performance guard
        run: |
          python3 scripts/profile_guard.py --profile full --release --cli-cargo-feature fff-zlob --enforce --out .benchmarks/perf-guard/release-full.json

      - name: Publish performance guard summary
        run: |
          python3 scripts/perfreport.py .benchmarks/perf-guard/release-full.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-perf-guard-full
          path: .benchmarks/perf-guard/*

  build-release-assets:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    needs: [prepare-release, validate-release-ref]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lash-linux-x86_64.tar.gz
            linker: ""
            apt_packages: ""
            brew_packages: ""
            # The Linux release cache is warmed on main by ci.yml.
            cache_key: linux-release
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lash-linux-aarch64.tar.gz
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            brew_packages: ""
            cache_key: cross-aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: lash-macos-aarch64.tar.gz
            linker: ""
            apt_packages: ""
            brew_packages: llvm
            cache_key: cross-aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      # Stamping the release version (below) invalidates every workspace
      # fingerprint, so this build recompiles all workspace crates on top of the
      # restored (dependency-warm) release cache. Reclaim the large preinstalled
      # toolchains this job never uses so the full workspace rebuild cannot
      # ENOSPC. (The debug jobs no longer need this: with the version-bump
      # commit gone, main pushes rebuild incrementally.)
      - name: Reclaim runner disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      # Restore-only against the shared caches ci.yml saves on main. Caches
      # saved here would be scoped to this run's tag ref, which no future
      # run can read — saving them would only thrash the repo's cache quota.
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: ${{ matrix.cache_key }}
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.brew_packages }}

      # main carries 0.0.0-dev; stamp the real version so the built binary
      # reports it (CARGO_PKG_VERSION -> `lash --version`, self-update checks).
      - name: Stamp release version
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: python3 scripts/release_version.py stamp "${RELEASE_TAG#v}"

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

      - name: Package release artifact
        run: scripts/package-release.sh ${{ matrix.target }} ${{ matrix.asset_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release-assets, perf-guard-full]
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}
          # Full history + tags: release_notes.py walks previous-tag..tag to
          # assemble the curated release body.
          fetch-depth: 0
          fetch-tags: true

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: lash-*.tar.gz
          merge-multiple: true

      - name: Prepare installer asset
        run: scripts/render-installer.sh "${RELEASE_TAG}" dist/install_lash.sh

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum lash-*.tar.gz > SHA256SUMS

      # Curated notes from `Release-Notes:` commit sections become the release
      # body; the auto-generated commit list is appended below. Written
      # outside dist/ so it is not uploaded as an asset. prepare-release has
      # already required curated notes before creating a new tag.
      - name: Collect release notes
        run: python3 scripts/release_notes.py collect --end "${RELEASE_TAG}" --out "${{ runner.temp }}/RELEASE_NOTES.md"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ runner.temp }}/RELEASE_NOTES.md
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

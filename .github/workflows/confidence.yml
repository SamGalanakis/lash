name: Confidence

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Confidence lane to run"
        required: true
        default: "full"
        type: choice
        options:
          - fast
          - default
          - broad
          - full
  schedule:
    - cron: "29 4 * * 0"

concurrency:
  group: confidence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LASH_CONFIDENCE_BOOTSTRAP: "1"
  LASH_CI_FEATURES: ""

jobs:
  confidence:
    name: Confidence ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'full' }}
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 360
    env:
      # The full lane's sim search seed space is partitioned across this job
      # (shard 1/9) and the eight sim-search matrix jobs (shards 2/9..9/9), so
      # the weekly fleet covers every configured seed exactly once. Non-full
      # lanes run their search lane unsharded.
      LASH_SIM_SHARD: ${{ (github.event_name != 'workflow_dispatch' || inputs.lane == 'full') && '1/9' || '1/1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
          shared-key: confidence

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run confidence gate
        run: bash scripts/confidence-gate.sh "${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'full' }}"

      - name: Upload confidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: confidence-artifacts
          path: target/confidence/**

  sim-search:
    name: Sim search shard ${{ matrix.shard }}/9
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.lane == 'full' }}
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [2, 3, 4, 5, 6, 7, 8, 9]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
          shared-key: confidence

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run sim search shard
        run: bash scripts/confidence-gate.sh "sim-search:${{ matrix.shard }}/9"

      - name: Upload sim search artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: confidence-sim-search-${{ matrix.shard }}
          path: target/confidence/sim-search/**

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: scripts/ci-install-apt-packages.sh protobuf-compiler

      - name: Test lash-sansio
        run: cargo test -p lash-sansio --locked

      - name: Test lash core
        run: cargo test -p lash-core --locked

      - name: Test SQLite store
        run: cargo test -p lash-sqlite-store --locked

      - name: Test lash facade
        run: cargo test -p lash-runtime --locked

      - name: Lint docs
        run: python3 scripts/lint_docs.py

      - name: Check docs snippets compile
        run: cargo check -p docs-snippets --locked --features fff-zlob

      - name: Enforce stack budget
        run: bash scripts/ci-stack-budget.sh

      - name: Test release automation scripts
        run: |
          python3 scripts/test_release_version.py
          python3 scripts/test_publish_workspace.py
          python3 scripts/test_profile_guard.py

      - name: Test first-party standard plugins
        run: cargo test -p lash-standard-plugins --locked --features fff-zlob

      - name: Test lash CLI
        run: cargo test -p lash-cli --locked --features fff-zlob

      # The perf harness lives in the dev-only `lash-perf` crate (runtime
      # benchmark) plus lash-cli's `bench` feature (UI benchmark). The Perf
      # jobs build both but the steps above do not. Compile them here so a
      # break in bench-only code surfaces on every PR instead of only
      # post-merge on the (main-only, ~15 min) Perf jobs.
      - name: Check perf harness builds
        run: |
          cargo check -p lash-perf --locked --all-targets --features fff-zlob
          cargo check -p lash-cli --locked --features bench,fff-zlob

  postgres-store:
    name: Test Postgres store
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lash
          POSTGRES_PASSWORD: lash
          POSTGRES_DB: lash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lash -d lash"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: scripts/ci-install-apt-packages.sh protobuf-compiler

      # `lash-postgres-store`'s conformance tests run the backend-agnostic
      # RuntimePersistence / ProcessRegistry / HostEventStore / LashlangArtifactStore
      # suites against a real Postgres. They self-skip when the URL is unset, so the
      # env var is what makes them actually execute here. `connect()` runs
      # `ensure_schema` (CREATE TABLE IF NOT EXISTS), so no separate migrate step.
      # The suites self-serialize on a shared in-process guard (they share one
      # database and reset() truncates all lash_* tables), so no --test-threads=1.
      - name: Test Postgres store (conformance)
        run: cargo test -p lash-postgres-store --locked
        env:
          LASH_POSTGRES_DATABASE_URL: postgres://lash:lash@localhost:5432/lash

  build-release-assets:
    name: Build (${{ matrix.target }})
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lash-linux-x86_64.tar.gz
            package_asset: true
            linker: ""
            apt_packages: protobuf-compiler
            brew_packages: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lash-linux-aarch64.tar.gz
            package_asset: true
            linker: aarch64-linux-gnu-gcc
            apt_packages: protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            brew_packages: ""
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: lash-macos-aarch64.tar.gz
            package_asset: true
            linker: ""
            apt_packages: ""
            brew_packages: protobuf llvm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ""
            package_asset: false
            linker: ""
            apt_packages: ""
            brew_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          save-if: ${{ runner.os != 'Windows' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.brew_packages }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

      - name: Package release artifact
        if: matrix.package_asset
        run: scripts/package-release.sh ${{ matrix.target }} ${{ matrix.asset_name }}

      - name: Upload release artifact
        if: matrix.package_asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  perf-guard:
    name: Perf Guard
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: scripts/ci-install-apt-packages.sh protobuf-compiler

      - name: Run performance guard
        run: |
          python3 scripts/profile_guard.py --profile quick --release --cargo-feature fff-zlob --skip-dhat --enforce --out .benchmarks/perf-guard/ci.json

      - name: Publish performance guard summary
        run: |
          python3 scripts/perfreport.py .benchmarks/perf-guard/ci.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard
          path: .benchmarks/perf-guard/*

  restate-e2e:
    name: Restate E2E
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: scripts/ci-install-apt-packages.sh protobuf-compiler

      - name: Install just
        uses: extractions/setup-just@v2

      # Each recipe boots a `restatedev/restate` container with host networking,
      # waits for the admin port, then runs the crate's `#[ignore]`d live e2e
      # test against it. The recipes own container lifecycle (cleanup on EXIT)
      # and use distinct ports/names, so they run back-to-back safely.
      - name: agent-service live Restate ingress e2e
        run: just agent-service-restate-e2e

      - name: agent-workbench live Restate cron e2e
        run: just agent-workbench-restate-e2e

  prepare-release:
    name: Prepare release
    # Allows release-automation-only fixes to run the full CI matrix without
    # immediately cutting the next version.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip release]')
    needs:
      - test
      - build-release-assets
      - perf-guard
      - restate-e2e
    runs-on: ubuntu-latest
    concurrency:
      group: lash-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next release version
        id: version
        run: |
          version="$(python3 scripts/release_version.py print-next)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update workspace version files
        run: python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"

      - name: Validate locked workspace after release bump
        run: cargo metadata --format-version 1 --locked >/dev/null

      - name: Commit release version
        id: commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote — Cargo manifests, the
          # lockfile, AND the doc version snippets (README + docs/*.html). The
          # checkout is clean, so -A captures exactly the bump's edits. Staging
          # only Cargo files here is what let the docs drift behind the version.
          git add -A
          git commit -m "Release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Sync release version to staging
        run: |
          if ! git ls-remote --exit-code --heads origin staging >/dev/null 2>&1; then
            echo "origin/staging not found; skipping version sync."
            exit 0
          fi

          sync_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$sync_dir"' EXIT
          git worktree add --detach "$sync_dir" origin/staging

          cd "$sync_dir"
          python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"
          cargo metadata --format-version 1 --locked >/dev/null
          if git diff --quiet; then
            echo "origin/staging already has version ${{ steps.version.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote (Cargo files + the doc
          # version snippets). git diff above now also notices doc-only drift,
          # so a stale README/docs heals on the next release even if Cargo is
          # already current.
          git add -A
          git commit -m "Sync release version to staging (v${{ steps.version.outputs.version }}) [skip ci]"
          git push origin HEAD:staging

      - name: Create and push release tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping."
            exit 0
          fi
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main
          git tag "${tag}"
          git push origin "${tag}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          for _ in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1
          gh workflow run release.yml --ref main -f release_tag="${tag}"

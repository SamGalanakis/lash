name: CI

# Note: GitHub natively skips push/PR runs when the head commit message
# contains [skip ci], so no per-job guards are needed for it.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # One feature set for every cargo invocation in this workflow so the
  # dependency graph resolves (and compiles) exactly once per profile.
  # fff-zlob is required wherever fff-search is built (its build.rs needs the
  # zig-backed zlob under CI); bench keeps lash-cli's UI-bench code compiling
  # on every push instead of only on the nightly Perf run.
  LASH_CI_FEATURES: >-
    -F lash-tools/fff-zlob
    -F lash-standard-plugins/fff-zlob
    -F lash-cli/fff-zlob
    -F lash-cli/bench
    -F lash-perf/fff-zlob
    -F docs-snippets/fff-zlob
    -F agent-workbench/fff-zlob

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # This job builds a superset of what the other debug-profile jobs
          # (Postgres store, Restate E2E, the distributed-workers e2e
          # workflow) need, so it is the sole writer of the shared cache.
          shared-key: linux-debug

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Lint docs
        run: python3 scripts/lint_docs.py

      - name: Test release automation scripts
        run: |
          python3 scripts/test_release_version.py
          python3 scripts/test_publish_workspace.py
          python3 scripts/test_profile_guard.py

      # Compiles every target of every workspace crate — libs, bins, tests,
      # examples, and benches. This subsumes the old standalone checks for
      # docs-snippets and the perf harness (lash-perf + lash-cli's bench
      # feature), which would otherwise only break post-merge.
      - name: Check workspace (all targets)
        run: cargo check --workspace --all-targets --locked ${LASH_CI_FEATURES}

      # Workspace-wide: every crate's tests run, not a hand-maintained crate
      # list. Live tests (Restate e2e, Postgres conformance without a
      # database URL) are #[ignore]d or self-skip.
      - name: Test workspace
        run: cargo nextest run --workspace --locked ${LASH_CI_FEATURES}

      # nextest does not run doctests; keep them covered.
      - name: Test workspace doctests
        run: cargo test --doc --workspace --locked ${LASH_CI_FEATURES}

      - name: Enforce stack budget
        run: bash scripts/ci-stack-budget.sh

  postgres-store:
    name: Test Postgres store
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lash
          POSTGRES_PASSWORD: lash
          POSTGRES_DB: lash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lash -d lash"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `lash-postgres-store`'s conformance tests run the backend-agnostic
      # RuntimePersistence / ProcessRegistry / HostEventStore / LashlangArtifactStore
      # suites against a real Postgres. They self-skip when the URL is unset, so the
      # env var is what makes them actually execute here. `connect()` runs
      # `ensure_schema` (CREATE TABLE IF NOT EXISTS), so no separate migrate step.
      # The suites self-serialize on a shared in-process guard (they share one
      # database and reset() truncates all lash_* tables), so no --test-threads=1.
      # That guard is per-process, so this must stay `cargo test` — nextest's
      # process-per-test model would race the suites against each other.
      - name: Test Postgres store (conformance)
        run: cargo test -p lash-postgres-store --locked
        env:
          LASH_POSTGRES_DATABASE_URL: postgres://lash:lash@localhost:5432/lash

  # Cross-target compile gate. The real release binaries are built from the
  # tag by release.yml; building (and discarding) them here too just doubled
  # the work, so this only type-checks the release feature set per target.
  # x86_64-linux needs no leg: Perf Guard release-builds the CLI stack on
  # every push. Release-profile link failures would surface in release.yml,
  # which is rerunnable via workflow_dispatch after a fix.
  cross-check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # No linking happens under `cargo check`, but build scripts still
            # cc-compile target C code, so the cross gcc is required.
            apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            apt_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: cross-${{ matrix.target }}

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Check release target
        run: cargo check --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

  perf-guard:
    name: Perf Guard
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # Sole writer of the linux release-profile cache; release.yml's
          # x86_64 build restores it (tag runs can read main-branch caches).
          shared-key: linux-release

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run performance guard
        run: |
          python3 scripts/profile_guard.py --profile quick --release --cargo-feature fff-zlob --skip-dhat --enforce --out .benchmarks/perf-guard/ci.json

      - name: Publish performance guard summary
        run: |
          python3 scripts/perfreport.py .benchmarks/perf-guard/ci.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard
          path: .benchmarks/perf-guard/*

  restate-e2e:
    name: Restate E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install just
        uses: extractions/setup-just@v2

      # Each recipe boots a `restatedev/restate` container with host networking,
      # waits for the admin port, then runs the crate's `#[ignore]`d live e2e
      # test against it. The recipes own container lifecycle (cleanup on EXIT)
      # and use distinct ports/names, so they run back-to-back safely.
      - name: agent-service live Restate ingress e2e
        run: just agent-service-restate-e2e

      - name: agent-workbench live Restate cron e2e
        run: just agent-workbench-restate-e2e

  prepare-release:
    name: Prepare release
    # Allows release-automation-only fixes to run the full CI matrix without
    # immediately cutting the next version.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip release]')
    needs:
      - test
      - postgres-store
      - cross-check
      - perf-guard
      - restate-e2e
    runs-on: ubuntu-latest
    concurrency:
      group: lash-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # release_version.py only inspects `git tag --list`; no commit
          # history is needed beyond HEAD.
          fetch-depth: 1
          fetch-tags: true

      - name: Compute next release version
        id: version
        run: |
          version="$(python3 scripts/release_version.py print-next)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update workspace version files
        run: python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"

      - name: Validate locked workspace after release bump
        run: cargo metadata --format-version 1 --locked >/dev/null

      - name: Commit release version
        id: commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote — Cargo manifests, the
          # lockfile, AND the doc version snippets (README + docs/*.html). The
          # checkout is clean, so -A captures exactly the bump's edits. Staging
          # only Cargo files here is what let the docs drift behind the version.
          git add -A
          git commit -m "Release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Sync release version to staging
        run: |
          if ! git ls-remote --exit-code --heads origin staging >/dev/null 2>&1; then
            echo "origin/staging not found; skipping version sync."
            exit 0
          fi

          git fetch --depth=1 origin staging
          sync_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$sync_dir"' EXIT
          git worktree add --detach "$sync_dir" FETCH_HEAD

          cd "$sync_dir"
          python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"
          cargo metadata --format-version 1 --locked >/dev/null
          if git diff --quiet; then
            echo "origin/staging already has version ${{ steps.version.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote (Cargo files + the doc
          # version snippets). git diff above now also notices doc-only drift,
          # so a stale README/docs heals on the next release even if Cargo is
          # already current.
          git add -A
          git commit -m "Sync release version to staging (v${{ steps.version.outputs.version }}) [skip ci]"
          git push origin HEAD:staging

      - name: Create and push release tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping."
            exit 0
          fi
          git fetch --depth=1 origin main
          git checkout --detach FETCH_HEAD
          git tag "${tag}"
          git push origin "${tag}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          for _ in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1
          gh workflow run release.yml --ref main -f release_tag="${tag}"

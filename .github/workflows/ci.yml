name: CI

# GitHub natively skips push/PR runs when the head commit requests a CI skip,
# so no per-job guards are needed for that.
#
# CI validates pull requests and the resulting commits on the main trunk.
# Releases are separate: a maintainer manually dispatches release.yml for a
# green commit on main. Ordinary merges never tag or publish.

on:
  # Manual re-validation for when GitHub drops a push event (merge commit
  # d70ce7ea got zero check suites). Recovery-only: no inputs, never invoked
  # from another workflow, and unrelated to the removed pass-2 bump chain.
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LASH_CI_FEATURES: ""

jobs:
  # Sole writer of the shared linux-debug cache and the doctest gate. It builds
  # the superset (`cargo check --workspace --all-targets` plus the doctest
  # link) that every read-only debug-profile job restores. The nextest run is
  # sharded out to the test-shard matrix below.
  test-doc:
    name: Test docs + build cache
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Reclaim runner disk
        run: bash scripts/ci-reclaim-disk.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # This job builds a superset of what the other debug-profile jobs
          # (test shards, Postgres store, Restate E2E, the distributed-workers
          # e2e workflow) need, so it is the sole writer of the shared cache.
          shared-key: linux-debug

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Lint docs
        run: python3 scripts/lint_docs.py

      - name: Test release automation scripts
        run: |
          python3 scripts/test_release_version.py
          python3 scripts/test_publish_workspace.py
          python3 scripts/test_confidence_gate_ci_contract.py
          python3 scripts/test_release_notes.py

      # Compiles every target of every workspace crate — libs, bins, tests,
      # examples, and benches. This subsumes the old standalone checks for
      # docs-snippets and the runtime perf harness, which would otherwise only break post-merge. It also warms the
      # dependency graph the test-shard matrix restores.
      - name: Check workspace (all targets)
        run: |
          # shellcheck disable=SC2086
          cargo check --workspace --all-targets --locked ${LASH_CI_FEATURES}

      - name: Check lash-runtime feature boundary
        run: |
          cargo check -p lash-runtime --no-default-features --locked
          cargo check -p lash-runtime --no-default-features --features testing --locked

          if cargo tree -p lash-runtime -e normal --no-default-features --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default-off lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

          if cargo tree -p lash-runtime -e normal --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

          if cargo tree -p lash-runtime -e normal --no-default-features --features testing --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "testing-only lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

      # nextest does not run doctests; keep them covered here (also builds the
      # workspace crates as rlibs, warming the shared cache for the readers).
      - name: Test workspace doctests
        run: |
          # shellcheck disable=SC2086
          cargo test --doc --workspace --locked ${LASH_CI_FEATURES}

  # The workspace test suite, sharded by nextest partitions so it drops off the
  # critical path. Restore-only against the linux-debug cache the test-doc job
  # writes; sccache absorbs the workspace test-binary codegen that rust-cache's
  # read-only restore cannot save, sharing it across the shards and runs.
  # --no-fail-fast so one failure never hides the rest (the alpha.82 lesson).
  test-shard:
    name: Test shard ${{ matrix.shard }}/3
    runs-on: blacksmith-16vcpu-ubuntu-2404

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reclaim runner disk
        run: bash scripts/ci-reclaim-disk.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      # Workspace-wide: every crate's tests run, not a hand-maintained crate
      # list. Live tests (Restate e2e, Postgres conformance without a database
      # URL) are #[ignore]d or self-skip. Partition count:i/3 splits execution
      # across the three shards.
      - name: Test workspace shard
        run: |
          # shellcheck disable=SC2086
          cargo nextest run --workspace --locked ${LASH_CI_FEATURES} \
            --no-fail-fast --partition count:${{ matrix.shard }}/3

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # The test-doc job is the sole writer of the shared linux-debug cache;
          # the lint job only reads it so clippy reuses the checked dependency
          # graph.
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `cargo fmt --all --check` and the same `--all-targets` clippy the local
      # push gate runs, plus the two boundary guards that otherwise gate nothing.
      # The clippy feature set mirrors the test-doc workspace check so the
      # dependency graph resolves identically.
      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets)
        run: |
          # shellcheck disable=SC2086
          cargo clippy --workspace --all-targets --locked ${LASH_CI_FEATURES} -- -D warnings

      - name: Check core/UI boundary
        run: bash scripts/check-core-ui-boundary.sh

      - name: Check workflow graph model
        run: bash scripts/check-workflow-graph-model.sh

      - name: Check production file-size budget
        run: bash scripts/check-production-file-size.sh

  confidence-fast:
    name: Confidence fast (${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard:
          - scenario-harnesses
          - fault-matrix
          - sim-unit-perf-guards
          - sim-generated
          - minimizer-fixtures

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reclaim runner disk
        run: bash scripts/ci-reclaim-disk.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Run confidence fast shard
        run: bash scripts/confidence-gate.sh "fast:${{ matrix.shard }}"

      - name: Upload confidence fast shard artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: confidence-fast-${{ matrix.shard }}
          path: target/confidence/fast/${{ matrix.shard }}
          if-no-files-found: warn

  confidence-fast-summary:
    name: Confidence fast summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - confidence-fast

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download confidence fast shard artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: confidence-fast-*
          path: target/confidence/fast-download
          merge-multiple: false

      - name: Assemble confidence fast shard tree
        run: |
          rm -rf target/confidence/fast
          mkdir -p target/confidence/fast
          for shard in scenario-harnesses fault-matrix sim-unit-perf-guards sim-generated minimizer-fixtures; do
            cp -a "target/confidence/fast-download/confidence-fast-${shard}" "target/confidence/fast/${shard}"
          done

      - name: Validate confidence fast summary
        run: bash scripts/confidence-gate.sh fast:summary

      - name: Upload confidence fast summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: confidence-fast-summary
          path: target/confidence/fast
          if-no-files-found: error

  postgres-store:
    name: Test Postgres store
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lash
          POSTGRES_PASSWORD: lash
          POSTGRES_DB: lash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lash -d lash"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `lash-postgres-store`'s conformance tests run the backend-agnostic
      # RuntimePersistence / SessionStoreFactory / ProcessRegistry /
      # TriggerStore / LashlangArtifactStore suites against a real Postgres.
      # They self-skip when the URL is unset, so the env var is what makes
      # them actually execute here. `connect()` runs `ensure_schema` (CREATE
      # TABLE IF NOT EXISTS), so no separate migrate step.
      # The suites self-serialize on a shared in-process guard (they share one
      # database and reset() truncates all lash_* tables), so no --test-threads=1.
      # That guard is per-process, so this must stay `cargo test` — nextest's
      # process-per-test model would race the suites against each other.
      - name: Test Postgres store (conformance)
        run: cargo test -p lash-postgres-store --locked
        env:
          LASH_POSTGRES_DATABASE_URL: postgres://lash:lash@localhost:5432/lash

  stack-budget:
    name: Stack budget
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Enforce stack budget
        run: bash scripts/ci-stack-budget.sh

  # Cross-target compile gate. Release-profile link coverage is split by
  # platform: x86_64 Linux is built by linux-release-cache, while cross
  # targets are type-checked here.
  cross-check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # No linking happens under `cargo check`, but build scripts still
            # cc-compile target C code, so the cross gcc is required.
            apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            apt_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: cross-${{ matrix.target }}

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Check release target
        run: cargo check --locked --release --workspace --target ${{ matrix.target }}

  linux-release-cache:
    name: Build Linux release cache
    runs-on: blacksmith-16vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reclaim runner disk
        run: bash scripts/ci-reclaim-disk.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # Sole writer of the linux release-profile cache; release.yml's
          # x86_64 build restores it (then stamps the release version, so only
          # the workspace crates rebuild — the cached deps stay warm).
          shared-key: linux-release

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Build release workspace
        run: cargo build --locked --release --workspace --target x86_64-unknown-linux-gnu

  functional-e2e:
    name: Functional E2E (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-service
            recipe: agent-service-restate-e2e
            node: false
          - name: agent-workbench
            recipe: agent-workbench-restate-e2e
            node: false
          - name: workflow-graph-roundtrip
            recipe: workflow-graph-integration-verify
            node: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable


      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install Node
        if: matrix.node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/workflow-graph-roundtrip/frontend/package-lock.json

      - name: Install just
        uses: extractions/setup-just@v2

      # Each recipe owns its dependencies and any container lifecycle, so the
      # matrix legs run independently without cross-job coordination.
      - name: Run example integration verification
        run: just ${{ matrix.recipe }}

  restate-postgres-workers:
    name: Restate + Postgres + MinIO Workers
    runs-on: blacksmith-16vcpu-ubuntu-2404
    # The harness has grown to 24 workflows + turn-control gates; 30 minutes
    # was hit on 2026-07-20 (job-timeout shows as 'cancelled').
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reclaim runner disk
        run: bash scripts/ci-reclaim-disk.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The e2e binaries are built on the host by the just recipe and
      # bind-mounted into the compose services, so the build reuses the
      # workspace debug cache that the test-doc job saves.
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run distributed backend E2E
        run: bash scripts/restate-postgres-workers-e2e.sh

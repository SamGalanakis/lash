name: CI

# Note: GitHub natively skips push/PR runs when the head commit message
# contains [skip ci], so no per-job guards are needed for it.

on:
  pull_request:
  push:
    branches:
      - main
  # The release flow is two-pass and the bump commit is pushed with
  # GITHUB_TOKEN, which never triggers `on: push` runs — so pass 1
  # explicitly dispatches this workflow to validate the bump commit and
  # cut the tag (pass 2).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # One feature set for every cargo invocation in this workflow so the
  # dependency graph resolves (and compiles) exactly once per profile.
  # fff-zlob is required by the CLI-owned grep crate (fff-search build.rs needs
  # the zig-backed zlob under CI); bench keeps lash-cli's UI-bench code compiling
  # on every push without running the heavyweight performance guard in CI/CD.
  LASH_CI_FEATURES: >-
    -F lash-cli/fff-zlob
    -F lash-cli/bench

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # This job builds a superset of what the other debug-profile jobs
          # (Postgres store, Restate E2E, the distributed-workers e2e
          # workflow) need, so it is the sole writer of the shared cache.
          shared-key: linux-debug

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Lint docs
        run: python3 scripts/lint_docs.py

      - name: Test release automation scripts
        run: |
          python3 scripts/test_release_version.py
          python3 scripts/test_publish_workspace.py
          python3 scripts/test_profile_guard.py
          python3 scripts/test_release_notes.py

      # Compiles every target of every workspace crate — libs, bins, tests,
      # examples, and benches. This subsumes the old standalone checks for
      # docs-snippets and the perf harness (lash-perf + lash-cli's bench
      # feature), which would otherwise only break post-merge.
      - name: Check workspace (all targets)
        run: |
          # shellcheck disable=SC2086
          cargo check --workspace --all-targets --locked ${LASH_CI_FEATURES}

      - name: Smoke release CLI stack guard
        run: |
          python3 scripts/profile_cli_release_stack.py --scenario info_standard --stack-bytes 2m --timeout-seconds 30 --cargo-feature fff-zlob --out .benchmarks/perf-guard/ci-cli-release-stack.json

      - name: Check lash-runtime feature boundary
        run: |
          cargo check -p lash-runtime --no-default-features --locked

          if cargo tree -p lash-runtime -e normal --no-default-features --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default-off lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

          if cargo tree -p lash-runtime -e normal --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

      # Workspace-wide: every crate's tests run, not a hand-maintained crate
      # list. Live tests (Restate e2e, Postgres conformance without a
      # database URL) are #[ignore]d or self-skip.
      - name: Test workspace
        run: |
          # shellcheck disable=SC2086
          cargo nextest run --workspace --locked ${LASH_CI_FEATURES}

      - name: Confidence gate fast lane
        run: bash scripts/confidence-gate.sh fast

      # nextest does not run doctests; keep them covered.
      - name: Test workspace doctests
        run: |
          # shellcheck disable=SC2086
          cargo test --doc --workspace --locked ${LASH_CI_FEATURES}

  postgres-store:
    name: Test Postgres store
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lash
          POSTGRES_PASSWORD: lash
          POSTGRES_DB: lash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lash -d lash"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `lash-postgres-store`'s conformance tests run the backend-agnostic
      # RuntimePersistence / SessionStoreFactory / ProcessRegistry /
      # TriggerStore / LashlangArtifactStore suites against a real Postgres.
      # They self-skip when the URL is unset, so the env var is what makes
      # them actually execute here. `connect()` runs `ensure_schema` (CREATE
      # TABLE IF NOT EXISTS), so no separate migrate step.
      # The suites self-serialize on a shared in-process guard (they share one
      # database and reset() truncates all lash_* tables), so no --test-threads=1.
      # That guard is per-process, so this must stay `cargo test` — nextest's
      # process-per-test model would race the suites against each other.
      - name: Test Postgres store (conformance)
        run: cargo test -p lash-postgres-store --locked
        env:
          LASH_POSTGRES_DATABASE_URL: postgres://lash:lash@localhost:5432/lash

  stack-budget:
    name: Stack budget
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Enforce stack budget
        run: bash scripts/ci-stack-budget.sh

  # Cross-target compile gate. Release-profile link coverage is split by
  # platform: x86_64 Linux is built by linux-release-cache, while the cross
  # targets are type-checked here and fully linked by release.yml.
  cross-check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # No linking happens under `cargo check`, but build scripts still
            # cc-compile target C code, so the cross gcc is required.
            apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            apt_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: cross-${{ matrix.target }}

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Check release target
        run: cargo check --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

  linux-release-cache:
    name: Build Linux release cache
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # Sole writer of the linux release-profile cache; release.yml's
          # x86_64 build restores it after the versioned release commit passes CI.
          shared-key: linux-release

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Build release binary
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target x86_64-unknown-linux-gnu

  restate-e2e:
    name: Restate E2E (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-service
            recipe: agent-service-restate-e2e
          - name: agent-workbench
            recipe: agent-workbench-restate-e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install just
        uses: extractions/setup-just@v2

      # Each recipe owns its container lifecycle and uses distinct ports/names,
      # so the matrix legs run independently without cross-job coordination.
      - name: Run live Restate e2e
        run: just ${{ matrix.recipe }}

  restate-postgres-workers:
    name: Restate + Postgres + MinIO Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The e2e binaries are built on the host by the just recipe and
      # bind-mounted into the compose services, so the build reuses the
      # workspace debug cache that the Test job saves.
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run distributed backend E2E
        run: just restate-postgres-workers-e2e

  prepare-release:
    name: Prepare release
    # Allows release-automation-only fixes to run the full CI matrix without
    # immediately cutting the next version.
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip release]')
    needs:
      - test
      - postgres-store
      - stack-budget
      - cross-check
      - linux-release-cache
      - restate-e2e
      - restate-postgres-workers
    runs-on: ubuntu-latest
    concurrency:
      group: lash-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && 'main' || github.sha }}
          # Full history INCLUDING TAGS: release_version.py computes the next
          # version from `git tag --list`. A shallow checkout with fetch-tags
          # does NOT deliver the tags (tag-following only covers fetched
          # commits), which silently re-releases the current version forever.
          fetch-depth: 0

      # Every release ships curated notes: at least one commit in
      # last-tag..HEAD must carry a `Release-Notes:` section (Markdown after
      # the marker line). Fails BEFORE any release mutation; push with
      # [skip release] if this range deliberately cuts no release.
      - name: Require release notes
        run: python3 scripts/release_notes.py collect --require

      - name: Compute next release version
        id: version
        run: |
          version="$(python3 scripts/release_version.py print-next)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update workspace version files
        run: python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"

      - name: Validate locked workspace after release bump
        run: cargo metadata --format-version 1 --locked >/dev/null

      - name: Commit release version
        id: commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote — Cargo manifests, the
          # lockfile, AND the doc version snippets (README + docs/*.html). The
          # checkout is clean, so -A captures exactly the bump's edits. Staging
          # only Cargo files here is what let the docs drift behind the version.
          git add -A
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          echo "created=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes never trigger `on: push`, so the bump commit
      # would otherwise sit on main forever with no pass-2 run to validate
      # it and cut the tag. Dispatch the next pass explicitly.
      - name: Dispatch validation pass for the release commit
        if: steps.commit.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref main

      - name: Sync release version to staging
        run: |
          if ! git ls-remote --exit-code --heads origin staging >/dev/null 2>&1; then
            echo "origin/staging not found; skipping version sync."
            exit 0
          fi

          sync_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$sync_dir"' EXIT
          git worktree add --detach "$sync_dir" origin/staging

          cd "$sync_dir"
          python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"
          cargo metadata --format-version 1 --locked >/dev/null
          if git diff --quiet; then
            echo "origin/staging already has version ${{ steps.version.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything release_version.py rewrote (Cargo files + the doc
          # version snippets). git diff above now also notices doc-only drift,
          # so a stale README/docs heals on the next release even if Cargo is
          # already current.
          git add -A
          git commit -m "Sync release version to staging (v${{ steps.version.outputs.version }})"
          git push origin HEAD:staging

      - name: Create and push release tag
        if: steps.commit.outputs.created != 'true'
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping."
            exit 0
          fi
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main
          git tag "${tag}"
          git push origin "${tag}"

      - name: Trigger release workflow
        if: steps.commit.outputs.created != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          for _ in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1
          gh workflow run release.yml --ref main -f release_tag="${tag}"

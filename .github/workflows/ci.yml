name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Test lash-sansio
        run: cargo test -p lash-sansio --locked

      - name: Test lash core
        run: cargo test -p lash-core --locked

      - name: Test lash facade
        run: cargo test -p lash-runtime --locked

      - name: Test first-party standard plugins
        run: cargo test -p lash-standard-plugins --locked --features fff-zlob

      - name: Test lash CLI
        run: cargo test -p lash-cli --locked --features fff-zlob

  build-release-assets:
    name: Build (${{ matrix.target }})
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lash-linux-x86_64.tar.gz
            package_asset: true
            linker: ""
            apt_packages: protobuf-compiler
            brew_packages: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lash-linux-aarch64.tar.gz
            package_asset: true
            linker: aarch64-linux-gnu-gcc
            apt_packages: protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            brew_packages: ""
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: lash-macos-aarch64.tar.gz
            package_asset: true
            linker: ""
            apt_packages: ""
            brew_packages: protobuf llvm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ""
            package_asset: false
            linker: ""
            apt_packages: ""
            brew_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          save-if: ${{ runner.os != 'Windows' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.brew_packages }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

      - name: Package release artifact
        if: matrix.package_asset
        run: scripts/package-release.sh ${{ matrix.target }} ${{ matrix.asset_name }}

      - name: Upload release artifact
        if: matrix.package_asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  ui-perf:
    name: UI Perf
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run synthetic UI performance benchmark
        run: |
          python3 scripts/profile_ui.py --build --release --cargo-feature fff-zlob --runs 5 --warmups 1 --out .benchmarks/ui-perf/ci.json

      - name: Publish UI performance summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(".benchmarks/ui-perf/ci.json").read_text())
          params = report["parameters"]
          scenarios = report.get("scenarios", [])

          def metric_line(name, item, unit="ms"):
              parts = []
              for key in ("p50", "p95", "p99", "max", "mean"):
                  if key in item:
                      parts.append(f"{key} `{item[key]}{unit}`")
              return f"- `{name}`: " + ", ".join(parts)

          lines = [
              "## UI Perf",
              "",
              f"- viewport: `{params['width']}x{params['height']}`",
              f"- measured runs: `{params['runs']}`",
              f"- scenarios: `{', '.join(item['scenario'] for item in scenarios)}`",
          ]

          for item in scenarios:
              summary = item["summary"]
              lines.extend(["", f"### {item['scenario']}", ""])
              for name in sorted(summary):
                  lines.append(metric_line(name, summary[name]))

          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n")
          PY

      - name: Upload UI performance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-perf
          path: .benchmarks/ui-perf/ci.json

  runtime-perf:
    name: Runtime Perf
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run synthetic runtime performance benchmark
        run: |
          python3 scripts/profile_runtime.py --profile quick --release --cargo-feature fff-zlob --out .benchmarks/runtime-perf/ci.json

      - name: Publish runtime performance summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(".benchmarks/runtime-perf/ci.json").read_text())
          lines = [
              "## Runtime Perf",
              "",
              f"- runs: `{report['runs']}`",
              f"- warmups: `{report['warmups']}`",
              f"- turns: `{report['chat_turns']}`",
              f"- scenarios: `{', '.join(report['scenarios'])}`",
          ]
          for item in report["summary"]:
              lines.extend([
                  "",
                  f"### {item['scenario']}",
                  f"- `total_ms` mean: `{item['total_ms']['mean']}ms`",
                  f"- `run_turn_ms` mean: `{item['run_turn_ms']['mean']}ms`",
                  f"- `total_alloc_bytes` mean: `{item['total_alloc_bytes']['mean']}`",
                  f"- `total_live_bytes` mean: `{item['total_live_bytes']['mean']}`",
              ])
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n")
          PY

      - name: Upload runtime performance artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-perf
          path: .benchmarks/runtime-perf/ci.json

  prepare-release:
    name: Prepare release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    needs:
      - test
      - build-release-assets
      - ui-perf
      - runtime-perf
    runs-on: ubuntu-latest
    concurrency:
      group: lash-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next release version
        id: version
        run: |
          version="$(python3 scripts/release_version.py print-next)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update workspace version files
        run: python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"

      - name: Validate locked workspace after release bump
        run: cargo metadata --format-version 1 --locked >/dev/null

      - name: Commit release version
        id: commit
        run: |
          if git diff --quiet -- Cargo.toml Cargo.lock '**/Cargo.toml'; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git ls-files -z Cargo.toml Cargo.lock '**/Cargo.toml' | xargs -0 git add
          git commit -m "Release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Sync release version to staging
        run: |
          if ! git ls-remote --exit-code --heads origin staging >/dev/null 2>&1; then
            echo "origin/staging not found; skipping version sync."
            exit 0
          fi

          sync_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$sync_dir"' EXIT
          git worktree add --detach "$sync_dir" origin/staging

          cd "$sync_dir"
          python3 scripts/release_version.py set "${{ steps.version.outputs.version }}"
          cargo metadata --format-version 1 --locked >/dev/null
          if git diff --quiet -- Cargo.toml Cargo.lock '**/Cargo.toml'; then
            echo "origin/staging already has version ${{ steps.version.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git ls-files -z Cargo.toml Cargo.lock '**/Cargo.toml' | xargs -0 git add
          git commit -m "Sync release version to staging (v${{ steps.version.outputs.version }}) [skip ci]"
          git push origin HEAD:staging

      - name: Create and push release tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping."
            exit 0
          fi
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main
          git tag "${tag}"
          git push origin "${tag}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          for _ in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1
          gh workflow run release.yml --ref main -f release_tag="${tag}"

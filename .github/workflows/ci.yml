name: CI

# GitHub natively skips push/PR runs when the head commit requests a CI skip,
# so no per-job guards are needed for that.
#
# A green push to main cuts a release directly from that commit. There is no
# version-bump commit and no second validation pass: the release-notes-gate
# fails fast when the range carries no curated notes, the full matrix validates
# the pushed commit, and `prepare-release` tags that exact commit and dispatches
# release.yml. The release version is never written to main — it is stamped into
# the manifests at packaging time inside release.yml's ephemeral tag checkout
# (scripts/release_version.py stamp, scripts/publish_workspace.py --version).

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # One feature set for every cargo invocation in this workflow so the
  # dependency graph resolves (and compiles) exactly once per profile.
  # fff-zlob is required by the CLI-owned grep crate (fff-search build.rs needs
  # the zig-backed zlob under CI); bench keeps lash-cli's UI-bench code compiling
  # on every push without running the heavyweight performance guard in CI/CD.
  LASH_CI_FEATURES: >-
    -F lash-cli/fff-zlob
    -F lash-cli/bench

jobs:
  # Fail-early release-notes gate: no cargo, no cache, no `needs`, so a main
  # push with no curated notes in its range fails in under a minute instead of
  # after the full matrix. The release-cut job relies on this gate rather than
  # re-running the check.
  release-notes-gate:
    name: Release notes gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history + tags: release_notes.py walks previous-tag..HEAD.
          fetch-depth: 0

      - name: Require release notes
        run: python3 scripts/release_notes.py collect --require

  # Sole writer of the shared linux-debug cache and the doctest gate. It builds
  # the superset (`cargo check --workspace --all-targets` plus the doctest
  # link) that every read-only debug-profile job restores. The nextest run is
  # sharded out to the test-shard matrix below.
  test-doc:
    name: Test docs + build cache
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # This job builds a superset of what the other debug-profile jobs
          # (test shards, Postgres store, Restate E2E, the distributed-workers
          # e2e workflow) need, so it is the sole writer of the shared cache.
          shared-key: linux-debug

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Lint docs
        run: python3 scripts/lint_docs.py

      - name: Test release automation scripts
        run: |
          python3 scripts/test_release_version.py
          python3 scripts/test_publish_workspace.py
          python3 scripts/test_profile_guard.py
          python3 scripts/test_confidence_gate_ci_contract.py
          python3 scripts/test_release_notes.py

      # Compiles every target of every workspace crate — libs, bins, tests,
      # examples, and benches. This subsumes the old standalone checks for
      # docs-snippets and the perf harness (lash-perf + lash-cli's bench
      # feature), which would otherwise only break post-merge. It also warms the
      # dependency graph the test-shard matrix restores.
      - name: Check workspace (all targets)
        run: |
          # shellcheck disable=SC2086
          cargo check --workspace --all-targets --locked ${LASH_CI_FEATURES}

      - name: Smoke release CLI stack guard
        run: |
          python3 scripts/profile_cli_release_stack.py --scenario info_standard --stack-bytes 2m --timeout-seconds 30 --cargo-feature fff-zlob --out .benchmarks/perf-guard/ci-cli-release-stack.json

      - name: Check lash-runtime feature boundary
        run: |
          cargo check -p lash-runtime --no-default-features --locked

          if cargo tree -p lash-runtime -e normal --no-default-features --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default-off lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

          if cargo tree -p lash-runtime -e normal --locked | grep -E 'lash-protocol-rlm|lash-lashlang-runtime|lashlang'; then
            echo "default lash-runtime pulled RLM/Lashlang dependencies"
            exit 1
          fi

      # nextest does not run doctests; keep them covered here (also builds the
      # workspace crates as rlibs, warming the shared cache for the readers).
      - name: Test workspace doctests
        run: |
          # shellcheck disable=SC2086
          cargo test --doc --workspace --locked ${LASH_CI_FEATURES}

  # The workspace test suite, sharded by nextest partitions so it drops off the
  # critical path. Restore-only against the linux-debug cache the test-doc job
  # writes; sccache absorbs the workspace test-binary codegen that rust-cache's
  # read-only restore cannot save, sharing it across the shards and runs.
  # --no-fail-fast so one failure never hides the rest (the alpha.82 lesson).
  test-shard:
    name: Test shard ${{ matrix.shard }}/3
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      # Workspace-wide: every crate's tests run, not a hand-maintained crate
      # list. Live tests (Restate e2e, Postgres conformance without a database
      # URL) are #[ignore]d or self-skip. Partition count:i/3 splits execution
      # across the three shards.
      - name: Test workspace shard
        run: |
          # shellcheck disable=SC2086
          cargo nextest run --workspace --locked ${LASH_CI_FEATURES} \
            --no-fail-fast --partition count:${{ matrix.shard }}/3

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # The test-doc job is the sole writer of the shared linux-debug cache;
          # the lint job only reads it so clippy reuses the checked dependency
          # graph.
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `cargo fmt --all --check` and the same `--all-targets` clippy the local
      # push gate runs, plus the two boundary guards that otherwise gate nothing.
      # The clippy feature set mirrors the test-doc workspace check so the
      # dependency graph resolves identically (fff-zlob + bench).
      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets)
        run: |
          # shellcheck disable=SC2086
          cargo clippy --workspace --all-targets --locked ${LASH_CI_FEATURES} -- -D warnings

      - name: Check core/UI boundary
        run: bash scripts/check-core-ui-boundary.sh

      - name: Check production file-size budget
        run: bash scripts/check-production-file-size.sh

  confidence-fast:
    name: Confidence fast (${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard:
          - scenario-harnesses
          - fault-matrix
          - sim-unit-perf-guards
          - sim-generated
          - minimizer-fixtures

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: protoc,nextest

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Run confidence fast shard
        run: bash scripts/confidence-gate.sh "fast:${{ matrix.shard }}"

      - name: Upload confidence fast shard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-fast-${{ matrix.shard }}
          path: target/confidence/fast/${{ matrix.shard }}
          if-no-files-found: warn

  confidence-fast-summary:
    name: Confidence fast summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - confidence-fast

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download confidence fast shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: confidence-fast-*
          path: target/confidence/fast-download
          merge-multiple: false

      - name: Assemble confidence fast shard tree
        run: |
          rm -rf target/confidence/fast
          mkdir -p target/confidence/fast
          for shard in scenario-harnesses fault-matrix sim-unit-perf-guards sim-generated minimizer-fixtures; do
            cp -a "target/confidence/fast-download/confidence-fast-${shard}" "target/confidence/fast/${shard}"
          done

      - name: Validate confidence fast summary
        run: bash scripts/confidence-gate.sh fast:summary

      - name: Upload confidence fast summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-fast-summary
          path: target/confidence/fast
          if-no-files-found: error

  postgres-store:
    name: Test Postgres store
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lash
          POSTGRES_PASSWORD: lash
          POSTGRES_DB: lash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lash -d lash"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # `lash-postgres-store`'s conformance tests run the backend-agnostic
      # RuntimePersistence / SessionStoreFactory / ProcessRegistry /
      # TriggerStore / LashlangArtifactStore suites against a real Postgres.
      # They self-skip when the URL is unset, so the env var is what makes
      # them actually execute here. `connect()` runs `ensure_schema` (CREATE
      # TABLE IF NOT EXISTS), so no separate migrate step.
      # The suites self-serialize on a shared in-process guard (they share one
      # database and reset() truncates all lash_* tables), so no --test-threads=1.
      # That guard is per-process, so this must stay `cargo test` — nextest's
      # process-per-test model would race the suites against each other.
      - name: Test Postgres store (conformance)
        run: cargo test -p lash-postgres-store --locked
        env:
          LASH_POSTGRES_DATABASE_URL: postgres://lash:lash@localhost:5432/lash

  stack-budget:
    name: Stack budget
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Enforce stack budget
        run: bash scripts/ci-stack-budget.sh

  # Cross-target compile gate. Release-profile link coverage is split by
  # platform: x86_64 Linux is built by linux-release-cache, while the cross
  # targets are type-checked here and fully linked by release.yml.
  cross-check:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # No linking happens under `cargo check`, but build scripts still
            # cc-compile target C code, so the cross gcc is required.
            apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            apt_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: cross-${{ matrix.target }}

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: scripts/ci-install-apt-packages.sh ${{ matrix.apt_packages }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Check release target
        run: cargo check --locked --release -p lash-cli --features fff-zlob --target ${{ matrix.target }}

  linux-release-cache:
    name: Build Linux release cache
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          # Sole writer of the linux release-profile cache; release.yml's
          # x86_64 build restores it (then stamps the release version, so only
          # the workspace crates rebuild — the cached deps stay warm).
          shared-key: linux-release

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Build release binary
        run: cargo build --locked --release -p lash-cli --features fff-zlob --target x86_64-unknown-linux-gnu

  restate-e2e:
    name: Restate E2E (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-service
            recipe: agent-service-restate-e2e
          - name: agent-workbench
            recipe: agent-workbench-restate-e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: ./.github/actions/setup-ci-zig

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install just
        uses: extractions/setup-just@v2

      # Each recipe owns its container lifecycle and uses distinct ports/names,
      # so the matrix legs run independently without cross-job coordination.
      - name: Run live Restate e2e
        run: just ${{ matrix.recipe }}

  restate-postgres-workers:
    name: Restate + Postgres + MinIO Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The e2e binaries are built on the host by the just recipe and
      # bind-mounted into the compose services, so the build reuses the
      # workspace debug cache that the test-doc job saves.
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Run distributed backend E2E
        run: bash scripts/restate-postgres-workers-e2e.sh

  # Cuts the release straight from the validated commit: compute the next
  # version from the release channel + tags, tag this exact commit, and dispatch
  # release.yml. No version-bump commit, no second CI pass — release.yml stamps
  # the version into its ephemeral tag checkout at packaging time.
  prepare-release:
    name: Cut release
    # Allows release-automation-only fixes to run the full CI matrix without
    # cutting the next version (push with [skip release]).
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip release]')
    needs:
      - test-doc
      - test-shard
      - lint
      - confidence-fast-summary
      - postgres-store
      - stack-budget
      - cross-check
      - linux-release-cache
      - restate-e2e
      - restate-postgres-workers
      - release-notes-gate
    runs-on: ubuntu-latest
    concurrency:
      group: lash-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history INCLUDING TAGS: release_version.py computes the next
          # version from `git tag --list`. A shallow checkout with fetch-tags
          # does NOT deliver the tags (tag-following only covers fetched
          # commits), which silently re-releases the current version forever.
          fetch-depth: 0

      - name: Compute next release version
        id: version
        run: |
          version="$(python3 scripts/release_version.py print-next)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Tag the validated commit
        id: tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping tag creation."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tag the exact validated commit (this run's HEAD). Pushing with
          # GITHUB_TOKEN does not start release.yml's `on: push tags` run, so
          # the next step dispatches it explicitly.
          git tag "${tag}"
          git push origin "${tag}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          for _ in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1
          release_sha="$(git ls-remote --exit-code --tags origin "refs/tags/${tag}" | awk '{print $1}')"

          set +e
          dispatch_output="$(gh workflow run release.yml --ref main -f release_tag="${tag}" 2>&1)"
          dispatch_status=$?
          set -e

          if [ "$dispatch_status" -eq 0 ]; then
            printf '%s\n' "$dispatch_output"
            exit 0
          fi

          printf '%s\n' "$dispatch_output" >&2
          echo "Release workflow dispatch failed; checking whether GitHub created the run anyway." >&2

          runs_file="$(mktemp)"
          if ! gh run list --workflow release.yml --event workflow_dispatch --branch main --limit 20 \
            --json databaseId,status,headSha,createdAt > "$runs_file"; then
            echo "Could not list release workflow runs after dispatch failure." >&2
            exit "$dispatch_status"
          fi

          if python3 - "$release_sha" "$runs_file" <<'PY'
          import json
          import pathlib
          import sys

          release_sha = sys.argv[1]
          runs_file = pathlib.Path(sys.argv[2])
          for run in json.loads(runs_file.read_text(encoding="utf-8")):
              if run.get("headSha") == release_sha:
                  print(
                      "Found release workflow run "
                      f"{run.get('databaseId')} for release SHA {release_sha} "
                      f"({run.get('status')}, created {run.get('createdAt')})."
                  )
                  raise SystemExit(0)

          raise SystemExit(1)
          PY
          then
            exit 0
          fi

          exit "$dispatch_status"

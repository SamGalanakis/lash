name: Restate Postgres Workers E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/lash-core/**"
      - "crates/lash-postgres-store/**"
      - "crates/lash-s3-store/**"
      - "crates/lash-restate/**"
      - "e2e/restate-postgres-workers/**"
      - "justfile"
      - ".github/workflows/restate-postgres-workers-e2e.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/lash-core/**"
      - "crates/lash-postgres-store/**"
      - "crates/lash-s3-store/**"
      - "crates/lash-restate/**"
      - "e2e/restate-postgres-workers/**"
      - "justfile"
      - ".github/workflows/restate-postgres-workers-e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  restate-postgres-workers:
    name: Restate + Postgres + MinIO Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The e2e binaries are built on the host by the just recipe and
      # bind-mounted into the compose services, so the build reuses the
      # workspace debug cache that ci.yml's Test job saves.
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: linux-debug
          save-if: false

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run distributed backend E2E
        run: just restate-postgres-workers-e2e

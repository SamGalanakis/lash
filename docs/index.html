<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lash · docs</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800&family=Chivo+Mono:wght@400;500&family=Spectral:wght@400;500;600;ital,400&display=swap">
<link rel="stylesheet" href="./styles.css">
<script src="./theme.js"></script>
<script>
  // landing scene sits in the lower portion of the viewport in flow.
  // The SVG's sky-rect is transparent so the cover blends seamlessly
  // with the page background — no visible rectangle boundary.
  // suppressOutputStrand: keeps the brazier as just a flame, no
  // strands fanning into the sky — the period of "lash." carries
  // the sodium-ember visual rhyme to the candle below.
  window.__LASH_SCENE = {
    aspect: 4 / 16,
    scaleMin: 1.15,
    scaleMax: 1.4,
    suppressOutputStrand: true,
  };
</script>
<script src="./scene.js" defer></script>
<script src="./docs.js" defer></script>
<script src="./syntax.js" defer></script>
</head>
<body id="top" class="landing">
  <a class="skip-link" href="#content">skip to content</a>

  <header class="band">
    <div class="band__right">
      <button class="band__btn band__btn--search" type="button" data-cmdk-open aria-label="search docs (ctrl/cmd + k)" title="search docs (ctrl/cmd + k)"><span class="cmdk-label">search</span><span class="cmdk-kbd" aria-hidden="true">⌘K</span></button>
      <a class="band__btn band__btn--icon" href="https://github.com/SamGalanakis/lash" target="_blank" rel="noopener" aria-label="lash on GitHub" title="lash on GitHub"><svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2 .37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
      <button class="band__btn" id="theme-toggle" type="button" aria-label="toggle theme" title="toggle light / dark">
        <span class="glyph" id="theme-glyph" aria-hidden="true">◐</span>
        <span id="theme-label">light</span>
      </button>
    </div>
  </header>

  <main class="landing__hero" id="content">
    <h1 class="landing__title">lash<span class="slash">.</span></h1>
    <p class="landing__tagline">agent runtime</p>
    <div class="landing__cta-row">
      <a class="cta" href="./quickstart.html">read the docs <span aria-hidden="true">→</span></a>
    </div>
  </main>

  <section class="cover" aria-label="landing footer · twilight landscape">
    <svg
      id="range"
      class="cover__svg"
      preserveAspectRatio="xMidYMid slice"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-label="A warm-iron twilight landscape. A brazier on a left-side peak with strands fanning out, and a dark-robed figure on a right peak raising a dish toward sodium suns overhead."
    >
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#141412"/>
          <stop offset="65%" stop-color="#1a1814"/>
          <stop offset="100%" stop-color="#221d16"/>
        </linearGradient>
      </defs>
      <rect id="sky-rect" width="100%" height="100%" fill="transparent"/>
      <g id="g-back"></g>
      <g id="g-mid"></g>
      <g id="g-lash-behind"></g>
      <g id="g-near"></g>
      <g id="g-lash-front"></g>
      <g id="g-ground"></g>
    </svg>
  </section>
</body>
</html>

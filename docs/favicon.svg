<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="lash">
  <!-- lash favicon · the sodium slash on warm-iron.
       The slash is the brand mark that threads every flow/turns title;
       sodium amber (#e8a33c) lit on the site's warm-iron field (#141412). -->
  <defs>
    <filter id="ember" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
  </defs>

  <!-- warm-iron tile, matches the docs page background -->
  <rect width="32" height="32" rx="7" fill="#141412"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#2b2925" stroke-width="1"/>

  <!-- the slash, twice: a soft sodium glow under a crisp stroke -->
  <g stroke="#e8a33c" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="10.5" y1="23" x2="21.5" y2="9" opacity="0.5" filter="url(#ember)"/>
    <line x1="10.5" y1="23" x2="21.5" y2="9"/>
  </g>
</svg>

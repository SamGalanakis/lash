[package]
name = "lashlang"
version.workspace = true
edition = "2024"

[dependencies]
compact_str = { version = "0.9.0", features = ["serde"] }
rayon = "1"
rustc-hash = "2"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
criterion = "0.5"
proptest = "1"

[[bench]]
name = "benchmark"
harness = false

[package]
name = "lash-tool-shell"
version.workspace = true
edition = "2024"
license.workspace = true

[dependencies]
lash-core = { path = "../lash-core", default-features = false }
lash-tool-support = { path = "../lash-tool-support" }
async-trait = { workspace = true }
libc = "0.2"
portable-pty = "0.9"
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { path = "../lash-core", default-features = false, features = ["testing"] }

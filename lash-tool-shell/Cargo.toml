[package]
name = "lash-tool-shell"
version.workspace = true
edition = "2024"
license.workspace = true

[dependencies]
lash = { path = "../lash", default-features = false }
lash-tool-support = { path = "../lash-tool-support" }
async-trait = "0.1"
libc = "0.2"
portable-pty = "0.9"
serde_json = "1"
tokio = { version = "1", features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = { version = "0.7", features = ["rt"] }

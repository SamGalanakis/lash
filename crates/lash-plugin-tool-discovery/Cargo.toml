[package]
name = "lash-plugin-tool-discovery"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Tool-discovery plugin for the lash agent runtime."
keywords = ["lash", "agent", "tools", "plugin", "llm"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
semantic-tool-search = ["dep:model2vec-rs"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.11" }
async-trait = { workspace = true }
model2vec-rs = { version = "0.1.4", optional = true }
serde_json = { workspace = true }
schemars = { workspace = true }
strsim = "0.11"

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.11", features = ["testing"] }
tokio = { workspace = true, features = ["macros", "rt"] }

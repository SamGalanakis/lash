[package]
name = "lash-provider-openai"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "OpenAI-compatible (API key) provider for lash. Works with OpenRouter, OpenAI, vLLM, etc."
keywords = ["lash", "agent", "llm", "openai", "openrouter"]
categories = ["api-bindings", "asynchronous"]

[features]
# Enables the cross-provider response-normalization conformance test, which
# needs `lash-llm-transport`'s `testing` module. On by default so the suite
# runs under a plain `cargo test`.
default = ["testing"]
testing = ["lash-llm-transport/testing"]

[dependencies]
lash-core = { workspace = true }
lash-llm-transport = { workspace = true }
lash-openai-schema = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

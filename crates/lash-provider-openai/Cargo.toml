[package]
name = "lash-provider-openai"
version.workspace = true
edition = "2024"
license.workspace = true
description = "OpenAI-compatible (API key) provider for lash. Works with OpenRouter, OpenAI, vLLM, etc."

[dependencies]
lash-core = { path = "../lash-core" }
lash-llm-transport = { path = "../lash-llm-transport" }
lash-openai-schema = { path = "../lash-openai-schema" }
async-trait = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[package]
name = "lash-provider-openai"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "OpenAI providers for lash: API-key (OpenRouter, OpenAI, vLLM, etc.) and Codex OAuth (ChatGPT Plus/Pro/Team)."
keywords = ["lash", "agent", "llm", "openai", "codex"]
categories = ["api-bindings", "asynchronous"]

[features]
# Enables the cross-provider response-normalization conformance test, which
# needs `lash-llm-transport`'s `testing` module. On by default so the suite
# runs under a plain `cargo test`.
default = ["testing"]
testing = ["lash-llm-transport/testing"]

[lints]
workspace = true

[dependencies]
lash-core = { workspace = true }
lash-llm-transport = { workspace = true }
lash-provider-auth = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["net", "sync", "time"] }
tokio-tungstenite = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
# The runtime facade, so the Codex WebSocket path is proven end-to-end through
# a normal `LashCore` turn in `tests/codex_websocket_runtime.rs`.
lash = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }

[package]
name = "lash-lashlang-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Lashlang runtime integration for lash-core process engines and tool surfaces."
keywords = ["lash", "agent", "runtime", "lashlang"]
categories = ["asynchronous", "api-bindings"]

[features]
# Expose `lash_lashlang_runtime::testing::conformance`, the shared conformance
# suite for durable stores that fuse `lashlang::LashlangArtifactStore` and
# `lash_core::ProcessExecutionEnvStore`. This crate is the only layer that
# depends on both trait crates, so the cross-namespace isolation case (which
# needs both traits over one store) lives here rather than in either owner.
testing = ["lash-core/testing", "lashlang/testing"]

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
lash-core = { workspace = true }
lash-remote-protocol = { workspace = true }
lash-trace = { workspace = true }
lashlang = { workspace = true }
serde = { workspace = true, features = ["derive", "rc"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

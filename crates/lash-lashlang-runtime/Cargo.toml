[package]
name = "lash-lashlang-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Lashlang runtime integration for lash-core process engines and tool surfaces."
keywords = ["lash", "agent", "runtime", "lashlang"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
lash-core = { workspace = true }
lash-remote-protocol = { workspace = true }
lash-trace = { workspace = true }
lashlang = { workspace = true }
serde = { workspace = true, features = ["derive", "rc"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }
uuid = { workspace = true, features = ["v4"] }

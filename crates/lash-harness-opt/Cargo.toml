[package]
name = "lash-harness-opt"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "lash-harness-opt"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["derive"] }
dirs = "6"
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.7", default-features = false }
lash-cli = { path = "../lash-cli", version = "=0.1.0-alpha.7" }
lash-runtime = { path = "../lash", version = "=0.1.0-alpha.7" }
lash-providers-builtin = { path = "../lash-providers-builtin", version = "=0.1.0-alpha.7" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.7" }
lash-sansio = { path = "../lash-sansio", version = "=0.1.0-alpha.7" }
lash-trace = { path = "../lash-trace", version = "=0.1.0-alpha.7" }
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros", "rt-multi-thread", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }
uuid = { workspace = true, features = ["v4", "serde"] }

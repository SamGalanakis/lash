[package]
name = "lash-harness-opt"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "lash-harness-opt"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["derive"] }
dirs = "6"
lash-core = { workspace = true }
lash-cli = { workspace = true }
lash = { workspace = true }
lash-rlm-types = { workspace = true }
lash-sansio = { workspace = true }
lash-trace = { workspace = true }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros", "rt-multi-thread", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }
uuid = { workspace = true, features = ["v4", "serde"] }

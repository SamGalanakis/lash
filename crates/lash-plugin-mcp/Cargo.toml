[package]
name = "lash-plugin-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "MCP (Model Context Protocol) plugin for the lash agent runtime."
keywords = ["lash", "agent", "mcp", "plugin", "llm"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
lashlang = ["dep:lash-lashlang-runtime", "lash-tool-support/lashlang"]

[dependencies]
lash-core = { workspace = true }
lash-lashlang-runtime = { workspace = true, optional = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
http = "1"
rmcp = { workspace = true, features = [
    "client",
    "transport-child-process",
    "transport-streamable-http-client-reqwest",
    "client-side-sse",
    "reqwest",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["sync", "process", "rt", "macros", "time"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

[package]
name = "lash-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Built-in tool suite (patch, files, search, shell, web) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "llm", "runtime"]
categories = ["asynchronous", "development-tools"]

[features]
default = ["search"]
# The fff-search-backed `search.grep` tool family. Hosts that only need the
# other tool families can set `default-features = false` to drop the
# fff-search build dependency (whose build.rs requires Zig under CI).
search = ["dep:fff-search"]
fff-zlob = ["search", "fff-search/zlob"]

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
# Keep this exact until fff-search/zlob publish a Zig-compatible replacement.
fff-search = { version = "=0.6.2-nightly.a677d64", default-features = false, optional = true }
globset = "0.4"
libc = "0.2"
pdf-extract = "0.7"
portable-pty = "0.9"
regex = { workspace = true }
reqwest = { workspace = true, features = ["json", "query", "stream", "rustls"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tempfile = { workspace = true }

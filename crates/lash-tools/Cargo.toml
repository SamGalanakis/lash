[package]
name = "lash-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Built-in tool suite (patch, files, shell, web) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "llm", "runtime"]
categories = ["asynchronous", "development-tools"]

[features]
default = []

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
globset = "0.4"
libc = "0.2"
pdf-extract = "0.7"
portable-pty = "0.9"
regex = { workspace = true }
reqwest = { workspace = true, features = ["json", "query", "stream", "rustls"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
lashlang = { workspace = true }
tempfile = { workspace = true }

[package]
name = "lash-provider-codex"
version.workspace = true
edition = "2024"
license.workspace = true
description = "OpenAI Codex OAuth provider for lash (ChatGPT Plus/Pro/Team)."

[dependencies]
lash-core = { path = "../lash-core" }
lash-llm-transport = { path = "../lash-llm-transport" }
lash-provider-auth = { path = "../lash-provider-auth" }
lash-openai-schema = { path = "../lash-openai-schema" }
async-trait = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

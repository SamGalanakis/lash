[package]
name = "lash-subagents"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Subagent / spawn_agent harness for the lash agent runtime."
keywords = ["lash", "agent", "subagent", "spawn", "llm"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { workspace = true }
lash-lashlang-runtime = { workspace = true }
lash-llm-tools = { workspace = true, features = ["lashlang"] }
lash-protocol-rlm = { workspace = true }
lash-tool-support = { workspace = true }
lash-rlm-types = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
jsonschema = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }

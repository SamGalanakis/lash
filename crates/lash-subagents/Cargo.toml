[package]
name = "lash-subagents"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Subagent / spawn_agent harness for the lash agent runtime."
keywords = ["lash", "agent", "subagent", "spawn", "llm"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.13", default-features = false }
lash-llm-tools = { path = "../lash-llm-tools", version = "=0.1.0-alpha.13" }
lash-protocol-rlm = { path = "../lash-protocol-rlm", version = "=0.1.0-alpha.13" }
lash-tool-support = { path = "../lash-tool-support", version = "=0.1.0-alpha.13" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.13" }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.13", default-features = false, features = ["testing"] }
jsonschema = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }

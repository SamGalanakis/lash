[package]
name = "lash-provider-google"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Google OAuth (Gemini via Code Assist) provider for lash."
keywords = ["lash", "agent", "llm", "google", "gemini"]
categories = ["api-bindings", "asynchronous"]

[features]
# Enables the cross-provider response-normalization conformance test, which
# needs `lash-llm-transport`'s `testing` module. On by default so the suite
# runs under a plain `cargo test`.
default = ["testing"]
testing = ["lash-llm-transport/testing"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.14" }
lash-llm-transport = { path = "../lash-llm-transport", version = "=0.1.0-alpha.14" }
lash-provider-auth = { path = "../lash-provider-auth", version = "=0.1.0-alpha.14" }
async-trait = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
uuid = { workspace = true, features = ["v4"] }

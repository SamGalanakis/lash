[package]
name = "lash-tool-files"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "File-system tool suite (read/write/list) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "files", "llm"]
categories = ["asynchronous", "filesystem"]

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
globset = "0.4"
pdf-extract = "0.7"
serde_json = { workspace = true }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }

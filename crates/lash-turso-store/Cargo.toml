[package]
name = "lash-turso-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Turso-backed session store for the lash agent runtime."
keywords = ["lash", "agent", "turso", "persistence", "store"]
categories = ["database", "asynchronous"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.24" }
lashlang = { path = "../lashlang", version = "=0.1.0-alpha.24" }
async-trait = { workspace = true }
flate2 = "1"
futures-executor = "0.3"
rmp-serde = "1"
turso = { version = "0.7.0-pre.5", default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.24", features = ["testing"] }
lash-sansio = { path = "../lash-sansio", version = "=0.1.0-alpha.24" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }

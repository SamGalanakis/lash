[package]
name = "lash-cli"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[features]
default = []
dhat-heap = ["dep:dhat"]
fff-zlob = ["lash-standard-plugins/fff-zlob"]
semantic-tool-search = ["lash-standard-plugins/semantic-tool-search"]
# Hidden `--runtime-perf-benchmark` self-benchmark mode. Requires
# `lash-core/testing` fixtures and is intended for CI / dev profiling,
# not user-facing builds.
runtime-perf = ["dep:lash-plugin-observational-memory", "lash-core/testing"]

[lib]
name = "lash_cli"
path = "src/lib.rs"

[[bin]]
name = "lash"
path = "src/main.rs"

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.2", default-features = false, features = ["full"] }
lash-runtime = { path = "../lash", version = "=0.1.0-alpha.2" }
lash-plugin-mcp = { path = "../lash-plugin-mcp", version = "=0.1.0-alpha.2" }
lash-plugin-observational-memory = { path = "../lash-plugin-observational-memory", version = "=0.1.0-alpha.2", optional = true }
lash-sqlite-store = { path = "../lash-sqlite-store", version = "=0.1.0-alpha.2" }
lash-llm-tools = { path = "../lash-llm-tools", version = "=0.1.0-alpha.2" }
lash-standard-plugins = { path = "../lash-standard-plugins", version = "=0.1.0-alpha.2" }
lash-mode-rlm = { path = "../lash-mode-rlm", version = "=0.1.0-alpha.2" }
lash-mode-standard = { path = "../lash-mode-standard", version = "=0.1.0-alpha.2" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.2" }
lash-plugin-plan-mode = { path = "../lash-plugin-plan-mode", version = "=0.1.0-alpha.2" }
lash-plugin-prompt-context = { path = "../lash-plugin-prompt-context", version = "=0.1.0-alpha.2" }
lash-provider-anthropic = { path = "../lash-provider-anthropic", version = "=0.1.0-alpha.2" }
lash-provider-auth = { path = "../lash-provider-auth", version = "=0.1.0-alpha.2" }
lash-provider-codex = { path = "../lash-provider-codex", version = "=0.1.0-alpha.2" }
lash-provider-google = { path = "../lash-provider-google", version = "=0.1.0-alpha.2" }
lash-provider-openai = { path = "../lash-provider-openai", version = "=0.1.0-alpha.2" }
lash-providers-builtin = { path = "../lash-providers-builtin", version = "=0.1.0-alpha.2" }
lash-subagents = { path = "../lash-subagents", version = "=0.1.0-alpha.2" }
lash-tui-extensions = { path = "../lash-tui-extensions", version = "=0.1.0-alpha.2" }
lash-tui = { path = "../lash-tui", version = "=0.1.0-alpha.2" }
lash-autoresearch = { path = "../lash-autoresearch", version = "=0.1.0-alpha.2" }
lash-export = { path = "../lash-export", version = "=0.1.0-alpha.2" }
lash-file-index = { path = "../lash-file-index", version = "=0.1.0-alpha.2" }
crossterm = "0.28"
tokio = { workspace = true, features = ["full"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
semver = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter", "json"] }
pulldown-cmark = { workspace = true }
unicode-width = "0.2"
uuid = { workspace = true, features = ["v4"] }
rand = "0.9"
dirs = "6"
sha2 = { workspace = true }
base64 = { workspace = true }
stats_alloc = "0.1"
dhat = { version = "0.3", optional = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.2", default-features = false, features = ["full", "testing"] }
tempfile = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
arboard = { version = "3", features = ["wayland-data-control"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
arboard = "3"

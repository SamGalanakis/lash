[package]
name = "lash-cli"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[features]
default = []
dhat-heap = ["dep:dhat"]
fff-zlob = ["lash-standard-plugins/fff-zlob"]
semantic-tool-search = ["lash-standard-plugins/semantic-tool-search"]
test-provider = ["lash-core/testing"]
# Hidden self-benchmark apparatus (`--ui-perf-benchmark` and
# `--runtime-perf-benchmark`). Gates the `runtime_perf`, `ui_perf`, and
# `perf_support` modules plus their CLI flags so none compile into the
# default user-facing build. Requires `lash-core/testing` fixtures and is
# intended for CI / dev profiling only.
bench = ["dep:lash-plugin-observational-memory", "test-provider"]

[lib]
name = "lash_cli"
path = "src/lib.rs"

[[bin]]
name = "lash"
path = "src/main.rs"

[dependencies]
lash-core = { workspace = true }
lash = { workspace = true }
lash-plugin-mcp = { workspace = true }
lash-plugin-observational-memory = { workspace = true, optional = true }
lash-plugin-process-controls = { workspace = true }
lash-turso-store = { workspace = true }
lash-llm-tools = { workspace = true }
lash-standard-plugins = { workspace = true }
lash-protocol-rlm = { workspace = true }
lash-protocol-standard = { workspace = true }
lash-rlm-types = { workspace = true }
lash-plugin-plan-mode = { workspace = true }
lash-provider-anthropic = { workspace = true }
lash-provider-auth = { workspace = true }
lash-provider-codex = { workspace = true }
lash-provider-google = { workspace = true }
lash-provider-openai = { workspace = true }
lash-subagents = { workspace = true }
lash-tui-extensions = { workspace = true }
lash-tui = { workspace = true }
lash-autoresearch = { workspace = true }
lash-export = { workspace = true }
lash-file-index = { workspace = true }
crossterm = "0.28"
tokio = { workspace = true, features = ["full"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
semver = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter", "json"] }
pulldown-cmark = { workspace = true }
unicode-width = "0.2"
uuid = { workspace = true, features = ["v4"] }
rand = "0.9"
dirs = "6"
sha2 = { workspace = true }
base64 = { workspace = true }
stats_alloc = "0.1"
dhat = { version = "0.3", optional = true }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
portable-pty = "0.9"
tempfile = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
arboard = { version = "3", features = ["wayland-data-control"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
arboard = "3"

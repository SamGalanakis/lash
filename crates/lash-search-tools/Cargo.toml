[package]
name = "lash-search-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "CLI-only fff-backed local search tools for the lash agent runtime."
keywords = ["lash", "agent", "search", "tools", "cli"]
categories = ["asynchronous", "development-tools"]

[features]
default = []
fff-zlob = ["fff-search/zlob"]

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
fff-search = { version = "=0.6.2-nightly.a677d64", default-features = false }
regex = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tempfile = { workspace = true }

[package]
name = "lash-plugin-process-controls"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Process-control plugin for the lash agent runtime."
keywords = ["lash", "agent", "plugin", "process", "runtime"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.19", default-features = false }
lash-tool-support = { path = "../lash-tool-support", version = "=0.1.0-alpha.19" }
async-trait = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.19", default-features = false, features = ["testing"] }
tokio = { workspace = true, features = ["rt", "macros"] }

[package]
name = "lash-provider-anthropic"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Anthropic API (Claude) provider for lash."
keywords = ["lash", "agent", "llm", "anthropic", "claude"]
categories = ["api-bindings", "asynchronous"]

[features]
# Enables the cross-provider response-normalization conformance test, which
# needs `lash-llm-transport`'s `testing` module. On by default so the suite
# runs under a plain `cargo test`.
default = ["testing"]
testing = ["lash-llm-transport/testing"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.29" }
lash-llm-transport = { path = "../lash-llm-transport", version = "=0.1.0-alpha.29" }
async-trait = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

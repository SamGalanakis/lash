lash-tool-shell = { path = "../lash-tool-shell", version = "=0.1.0-alpha.29" }
lash-plugin-process-controls = { path = "../lash-plugin-process-controls", version = "=0.1.0-alpha.29" }
tokio = { workspace = true, features = ["full"] }

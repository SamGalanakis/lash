[package]
name = "lash-protocol-standard"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Standard protocol (native provider tool calls) for the lash agent runtime."
keywords = ["lash", "agent", "mode", "tools", "llm"]
categories = ["asynchronous", "api-bindings"]

[lints]
workspace = true

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }

[features]
default = []
lashlang = ["lash-tool-support/lashlang"]

[dev-dependencies]
lash-sqlite-store = { workspace = true }
lash-tools = { workspace = true }
lash-plugin-process-controls = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true }

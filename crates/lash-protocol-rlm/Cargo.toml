[package]
name = "lash-protocol-rlm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "RLM protocol (persistent Lashlang execution) for the lash agent runtime."
keywords = ["lash", "agent", "rlm", "lashlang", "llm"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { workspace = true }
lash-plugin-tool-output-budget = { workspace = true }
lashlang = { workspace = true }
lash-rlm-types = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
jsonschema = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync"] }
tempfile = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
lash-sansio = { workspace = true }
lash-protocol-standard = { workspace = true }
insta = "1"

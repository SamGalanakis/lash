[package]
name = "lash-export"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.19" }
lash-protocol-rlm = { path = "../lash-protocol-rlm", version = "=0.1.0-alpha.19" }
lash-sqlite-store = { path = "../lash-sqlite-store", version = "=0.1.0-alpha.19" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.19" }
anyhow = { workspace = true }
pulldown-cmark = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
clap = { workspace = true, features = ["derive"] }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "lash-export"
path = "src/bin/lash_export.rs"

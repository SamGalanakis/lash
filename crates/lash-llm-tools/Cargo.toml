[package]
name = "lash-llm-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "LLM-backed tool implementations (llm_query and friends) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "llm", "subagent"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
lashlang = ["dep:lash-lashlang-runtime", "lash-tool-support/lashlang"]

[dependencies]
lash-core = { workspace = true }
lash-lashlang-runtime = { workspace = true, optional = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
jsonschema = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tokio = { workspace = true, features = ["full"] }

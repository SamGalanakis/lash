[package]
name = "lash-llm-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "LLM-backed tool implementations (llm_query and friends) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "llm", "subagent"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.23", default-features = false }
lash-tool-support = { path = "../lash-tool-support", version = "=0.1.0-alpha.23" }
lashlang = { path = "../lashlang", version = "=0.1.0-alpha.23" }
async-trait = { workspace = true }
jsonschema = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.23", default-features = false, features = ["testing"] }
tokio = { workspace = true, features = ["full"] }

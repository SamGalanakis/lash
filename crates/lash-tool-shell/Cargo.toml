[package]
name = "lash-tool-shell"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Shell-execution tool for the lash agent runtime."
keywords = ["lash", "agent", "tools", "shell", "llm"]
categories = ["asynchronous", "command-line-interface"]

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
libc = "0.2"
portable-pty = "0.9"
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }

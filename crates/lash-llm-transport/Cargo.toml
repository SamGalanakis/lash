[package]
name = "lash-llm-transport"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "HTTP transport layer used by lash provider crates."
keywords = ["lash", "agent", "llm", "transport", "http"]
categories = ["asynchronous", "network-programming"]

[features]
# Exposes the cross-provider response-normalization conformance suite
# (`conformance`). Provider crates enable it as a dev-dependency feature.
testing = []

[dependencies]
lash-core = { workspace = true }
lash-sansio = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "time"] }
reqwest = { workspace = true, features = ["json", "query", "stream", "rustls"] }
bytes = { workspace = true }
serde_json = { workspace = true }

[package]
name = "lash-postgres-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "PostgreSQL-backed durable storage for the lash agent runtime."
keywords = ["lash", "agent", "postgres", "persistence", "store"]
categories = ["database", "asynchronous"]

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
hmac = { workspace = true }
lash-core = { workspace = true }
lashlang = { workspace = true }
rmp-serde = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true, default-features = false, features = ["runtime-tokio-rustls", "postgres"] }
tokio = { workspace = true, features = ["rt-multi-thread", "time", "sync"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
lash-lashlang-runtime = { workspace = true, features = ["testing"] }
lash-sqlite-store = { workspace = true }
rusqlite = { version = "0.37", features = ["bundled"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }

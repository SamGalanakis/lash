[package]
name = "lash-plugin-plan-mode"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Plan-mode plugin for the lash agent runtime."
keywords = ["lash", "agent", "plan", "plugin", "llm"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
lashlang = ["lash-tool-support/lashlang"]

[lints]
workspace = true

[dependencies]
lash-core = { workspace = true }
lash-tool-support = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true, features = ["derive"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
async-trait = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }

[package.metadata.cargo-machete]
ignored = ["schemars"]

[package]
name = "lash-restate"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
rust-version.workspace = true
description = "Restate durable execution adapter for Lash runtime effects"

[dependencies]
async-trait = { workspace = true }
futures-util = { workspace = true }
lash-core = { workspace = true }
lash-http-transport = { workspace = true }
restate-sdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
http = "1"
http-body-util = "0.1"
lash-core = { workspace = true, features = ["testing"] }
lash-lashlang-runtime = { workspace = true }
lashlang = { workspace = true }
lash-protocol-standard = { workspace = true, features = ["lashlang"] }
lash-sqlite-store = { workspace = true }
tempfile = { workspace = true }
rusqlite = { version = "0.37", features = ["bundled"] }

[package]
name = "lash-restate"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
rust-version.workspace = true
description = "Restate durable execution adapter for Lash runtime effects"

[dependencies]
async-trait = { workspace = true }
lash-core = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls", "http2"] }
restate-sdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
bytes = { workspace = true }
http = "1"
http-body-util = "0.1"
lash-core = { workspace = true, features = ["testing"] }
lashlang = { workspace = true }
lash-protocol-standard = { workspace = true }
lash-turso-store = { workspace = true }
tempfile = { workspace = true }
turso = { version = "0.7.0-pre.5", default-features = false }

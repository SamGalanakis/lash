[package]
name = "lash-plugin-prompt-context"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Prompt-context plugin for the lash agent runtime."
keywords = ["lash", "agent", "prompt", "plugin", "llm"]
categories = ["asynchronous", "api-bindings"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.5" }
async-trait = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.5", features = ["testing"] }
tokio = { workspace = true, features = ["full"] }

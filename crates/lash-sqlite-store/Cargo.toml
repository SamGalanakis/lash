[package]
name = "lash-sqlite-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "SQLite-backed session store for the lash agent runtime."
keywords = ["lash", "agent", "sqlite", "persistence", "store"]
categories = ["database", "asynchronous"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.17" }
lashlang = { path = "../lashlang", version = "=0.1.0-alpha.17" }
async-trait = { workspace = true }
flate2 = "1"
rmp-serde = "1"
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.17", features = ["testing"] }
lash-sansio = { path = "../lash-sansio", version = "=0.1.0-alpha.17" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }

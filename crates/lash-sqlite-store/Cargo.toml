[package]
name = "lash-sqlite-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "SQLite-backed session store for the lash agent runtime."
keywords = ["lash", "agent", "sqlite", "persistence", "store"]
categories = ["database", "asynchronous"]

[dependencies]
lash-core = { workspace = true }
lashlang = { workspace = true }
async-trait = { workspace = true }
flate2 = "1"
futures-executor = "0.3"
rmp-serde = "1"
tokio-rusqlite = { version = "0.7", features = ["bundled"] }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
lash-core = { workspace = true, features = ["testing"] }
lash-lashlang-runtime = { workspace = true, features = ["testing"] }
rusqlite = { version = "0.37", features = ["bundled"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }

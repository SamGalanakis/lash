[package]
name = "lash-tool-search"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Code-search tool (ripgrep-backed) for the lash agent runtime."
keywords = ["lash", "agent", "tools", "search", "llm"]
categories = ["asynchronous", "development-tools"]

[features]
default = []
fff-zlob = ["fff-search/zlob"]

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.16", default-features = false }
lash-tool-support = { path = "../lash-tool-support", version = "=0.1.0-alpha.16" }
async-trait = { workspace = true }
# Keep this exact until fff-search/zlob publish a Zig-compatible replacement.
fff-search = { version = "=0.6.2-nightly.a677d64", default-features = false }
regex = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.16", default-features = false, features = ["testing"] }
tempfile = { workspace = true }

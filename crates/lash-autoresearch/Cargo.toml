[package]
name = "lash-autoresearch"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[dependencies]
lash-core = { workspace = true }
lash-lashlang-runtime = { workspace = true }
lash-tui-extensions = { workspace = true }
lash = { workspace = true }
lash-tui = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["fs", "io-util", "process", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tempfile = { workspace = true }

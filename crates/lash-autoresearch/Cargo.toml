[package]
name = "lash-autoresearch"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.21", default-features = false }
lash-tui-extensions = { path = "../lash-tui-extensions", version = "=0.1.0-alpha.21" }
lash = { package = "lash-runtime", path = "../lash", version = "=0.1.0-alpha.21" }
lash-tui = { path = "../lash-tui", version = "=0.1.0-alpha.21" }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["fs", "io-util", "process", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

[dev-dependencies]
tempfile = { workspace = true }

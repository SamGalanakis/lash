[package]
name = "lash-provider-auth"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "OAuth helpers and credential storage shared by lash provider crates."
keywords = ["lash", "agent", "oauth", "auth", "llm"]
categories = ["api-bindings", "authentication"]

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
lash-core = { workspace = true }
reqwest = { workspace = true, features = ["json", "query", "stream", "rustls"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
chrono = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

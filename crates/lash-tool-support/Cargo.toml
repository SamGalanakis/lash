[package]
name = "lash-tool-support"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Shared types and helpers for building tools in the lash agent runtime."
keywords = ["lash", "agent", "tools", "support", "llm"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
lashlang = ["dep:lash-lashlang-runtime"]

[dependencies]
lash-core = { workspace = true }
lash-lashlang-runtime = { workspace = true, optional = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true }
ignore = "0.4"
similar = "2"

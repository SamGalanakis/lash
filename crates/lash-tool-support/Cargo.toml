[package]
name = "lash-tool-support"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Shared types and helpers for building tools in the lash agent runtime."
keywords = ["lash", "agent", "tools", "support", "llm"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []

[dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.27", default-features = false }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
ignore = "0.4"
similar = "2"

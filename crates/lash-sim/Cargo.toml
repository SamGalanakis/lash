[package]
name = "lash-sim"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Deterministic simulation harness for Lash."
publish = false

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
lash = { workspace = true, features = ["rlm"] }
lash-core = { workspace = true, features = ["testing"] }
lash-llm-transport = { workspace = true }
lash-lashlang-runtime = { workspace = true }
lash-provider-anthropic = { workspace = true }
lash-provider-google = { workspace = true }
lash-provider-openai = { workspace = true }
lash-protocol-rlm = { workspace = true }
lash-protocol-standard = { workspace = true }
lash-postgres-store = { workspace = true }
lash-rlm-types = { workspace = true }
lash-sqlite-store = { workspace = true }
lash-subagents = { workspace = true }
lash-tools = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true, default-features = false, features = ["postgres"] }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }

[dev-dependencies]
tempfile = { workspace = true }

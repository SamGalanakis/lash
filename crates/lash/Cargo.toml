[package]
# Crate name on crates.io. The library is still imported as `lash`
# (see lib section below) so `use lash::...` keeps working everywhere.
name = "lash-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Durable agent runtime for Rust: sessions, turns, tools, plugins. Embeddable facade over lash-core."
keywords = ["lash", "agent", "llm", "runtime", "ai"]
categories = ["asynchronous", "api-bindings"]

[lib]
name = "lash"
path = "src/lib.rs"

[dependencies]
async-trait = { workspace = true }
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.9" }
lash-mode-rlm = { path = "../lash-mode-rlm", version = "=0.1.0-alpha.9" }
lash-mode-standard = { path = "../lash-mode-standard", version = "=0.1.0-alpha.9" }
lash-local-store = { path = "../lash-local-store", version = "=0.1.0-alpha.9" }
lash-plugin-monitor = { path = "../lash-plugin-monitor", version = "=0.1.0-alpha.9" }
lash-plugin-tool-output-budget = { path = "../lash-plugin-tool-output-budget", version = "=0.1.0-alpha.9" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.9" }
lash-trace = { path = "../lash-trace", version = "=0.1.0-alpha.9" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tokio-util = { workspace = true }

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.9", features = ["testing"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
trybuild = "1"

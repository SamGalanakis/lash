[package]
# Crate name on crates.io. The library is still imported as `lash`
# (see lib section below) so `use lash::...` keeps working everywhere.
name = "lash-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Durable agent runtime for Rust: sessions, turns, tools, plugins. Embeddable facade over lash-core."
keywords = ["lash", "agent", "llm", "runtime", "ai"]
categories = ["asynchronous", "api-bindings"]

[lib]
name = "lash"
path = "src/lib.rs"

[dependencies]
async-trait = { workspace = true }
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.28" }
lash-remote-protocol = { path = "../lash-remote-protocol", version = "=0.1.0-alpha.28" }
lash-tool-support = { path = "../lash-tool-support", version = "=0.1.0-alpha.28" }
lash-protocol-rlm = { path = "../lash-protocol-rlm", version = "=0.1.0-alpha.28" }
lash-protocol-standard = { path = "../lash-protocol-standard", version = "=0.1.0-alpha.28" }
lash-local-store = { path = "../lash-local-store", version = "=0.1.0-alpha.28" }
lash-plugin-tool-output-budget = { path = "../lash-plugin-tool-output-budget", version = "=0.1.0-alpha.28" }
lash-rlm-types = { path = "../lash-rlm-types", version = "=0.1.0-alpha.28" }
lash-trace = { path = "../lash-trace", version = "=0.1.0-alpha.28" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tokio-util = { workspace = true }

[features]
# Exposes `lash::testing` (e.g. `TestProvider`) for embedder integration tests.
testing = ["lash-core/testing"]

[dev-dependencies]
lash-core = { path = "../lash-core", version = "=0.1.0-alpha.28", features = ["testing"] }
lash-subagents = { path = "../lash-subagents", version = "=0.1.0-alpha.28" }
lash-turso-store = { path = "../lash-turso-store", version = "=0.1.0-alpha.28" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
turso = { version = "0.7.0-pre.5", default-features = false }
trybuild = "1"

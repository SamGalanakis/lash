[package]
name = "lash-standard-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Default plugin stack bundle for the lash agent runtime."
keywords = ["lash", "agent", "plugins", "llm", "runtime"]
categories = ["asynchronous", "api-bindings"]

[features]
default = []
fff-zlob = ["lash-tool-search/fff-zlob"]
semantic-tool-search = ["lash-plugin-tool-discovery/semantic-tool-search"]

[dependencies]
lash-core = { workspace = true }
lash-plugin-observational-memory = { workspace = true }
lash-plugin-process-controls = { workspace = true }
lash-plugin-rolling-history = { workspace = true }
lash-plugin-tool-discovery = { workspace = true }
lash-plugin-tool-output-budget = { workspace = true }
lash-tool-apply-patch = { workspace = true }
lash-tool-files = { workspace = true }
lash-tool-search = { workspace = true }
lash-tool-shell = { workspace = true }
lash-tool-web = { workspace = true }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }

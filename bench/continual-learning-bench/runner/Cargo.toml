[package]
name = "bench-clbench-lash"
version.workspace = true
edition = "2024"
license.workspace = true

[[bin]]
name = "bench-clbench-lash"
path = "src/main.rs"

[dependencies]
dirs = "6"
lash = { path = "../../../lash", default-features = false, features = ["full"] }
lash-sqlite-store = { path = "../../../lash-sqlite-store" }
lash-llm-tools = { path = "../../../lash-llm-tools" }
lash-mode-rlm = { path = "../../../lash-mode-rlm" }
lash-rlm-types = { path = "../../../lash-rlm-types" }
lash-providers-builtin = { path = "../../../lash-providers-builtin" }
lash-subagents = { path = "../../../lash-subagents" }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

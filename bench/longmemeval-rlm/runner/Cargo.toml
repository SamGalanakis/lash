[package]
name = "bench-longmemeval-rlm"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "bench-longmemeval-rlm"
path = "src/main.rs"

[dependencies]
lash-runtime = { path = "../../../crates/lash", version = "=0.1.0-alpha.2" }
lash-mode-rlm = { path = "../../../crates/lash-mode-rlm", version = "=0.1.0-alpha.2" }
lash-sqlite-store = { path = "../../../crates/lash-sqlite-store", version = "=0.1.0-alpha.2" }
lash-llm-tools = { path = "../../../crates/lash-llm-tools", version = "=0.1.0-alpha.2" }
lash-plugin-observational-memory = { path = "../../../crates/lash-plugin-observational-memory", version = "=0.1.0-alpha.2" }
lash-plugin-rolling-history = { path = "../../../crates/lash-plugin-rolling-history", version = "=0.1.0-alpha.2" }
lash-provider-openai = { path = "../../../crates/lash-provider-openai", version = "=0.1.0-alpha.2" }
lash-subagents = { path = "../../../crates/lash-subagents", version = "=0.1.0-alpha.2" }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["rt"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
regex = { workspace = true }
async-trait = { workspace = true }
dotenvy = "0.15"

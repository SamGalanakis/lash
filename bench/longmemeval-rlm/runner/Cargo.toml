[package]
name = "bench-longmemeval-rlm"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "bench-longmemeval-rlm"
path = "src/main.rs"

[dependencies]
lash = { path = "../../../lash", default-features = false, features = ["full"] }
lash-mode-rlm = { path = "../../../lash-mode-rlm" }
lash-sqlite-store = { path = "../../../lash-sqlite-store" }
lash-llm-tools = { path = "../../../lash-llm-tools" }
lash-plugin-observational-memory = { path = "../../../lash-plugin-observational-memory" }
lash-plugin-rolling-history = { path = "../../../lash-plugin-rolling-history" }
lash-provider-openai = { path = "../../../lash-provider-openai" }
lash-subagents = { path = "../../../lash-subagents" }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["rt"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
regex = { workspace = true }
async-trait = { workspace = true }
dotenvy = "0.15"

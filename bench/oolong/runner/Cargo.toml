[package]
name = "bench-oolong"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "bench-oolong"
path = "src/main.rs"

[dependencies]
lash-core = { path = "../../../crates/lash-core", default-features = false, features = ["full"] }
lash = { path = "../../../crates/lash" }
lash-cli = { path = "../../../crates/lash-cli" }
lash-export = { path = "../../../crates/lash-export" }
lash-sqlite-store = { path = "../../../crates/lash-sqlite-store" }
lash-llm-tools = { path = "../../../crates/lash-llm-tools" }
lash-mode-rlm = { path = "../../../crates/lash-mode-rlm" }
lash-rlm-types = { path = "../../../crates/lash-rlm-types" }
lash-provider-openai = { path = "../../../crates/lash-provider-openai" }
lash-providers-builtin = { path = "../../../crates/lash-providers-builtin" }
lash-subagents = { path = "../../../crates/lash-subagents" }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["rt"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
async-trait = { workspace = true }
dirs = "6"
dotenvy = "0.15"

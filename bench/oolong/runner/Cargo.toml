[package]
name = "bench-oolong"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[[bin]]
name = "bench-oolong"
path = "src/main.rs"

[dependencies]
lash-core = { path = "../../../crates/lash-core", version = "=0.1.0-alpha.8", default-features = false }
lash-runtime = { path = "../../../crates/lash", version = "=0.1.0-alpha.8" }
lash-cli = { path = "../../../crates/lash-cli", version = "=0.1.0-alpha.8" }
lash-export = { path = "../../../crates/lash-export", version = "=0.1.0-alpha.8" }
lash-sqlite-store = { path = "../../../crates/lash-sqlite-store", version = "=0.1.0-alpha.8" }
lash-llm-tools = { path = "../../../crates/lash-llm-tools", version = "=0.1.0-alpha.8" }
lash-mode-rlm = { path = "../../../crates/lash-mode-rlm", version = "=0.1.0-alpha.8" }
lash-rlm-types = { path = "../../../crates/lash-rlm-types", version = "=0.1.0-alpha.8" }
lash-provider-openai = { path = "../../../crates/lash-provider-openai", version = "=0.1.0-alpha.8" }
lash-providers-builtin = { path = "../../../crates/lash-providers-builtin", version = "=0.1.0-alpha.8" }
lash-subagents = { path = "../../../crates/lash-subagents", version = "=0.1.0-alpha.8" }
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["rt"] }
clap = { workspace = true, features = ["derive", "env"] }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
async-trait = { workspace = true }
dirs = "6"
dotenvy = "0.15"

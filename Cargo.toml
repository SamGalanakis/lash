[workspace]
members = [
    "lash-sansio",
    "lash-trace",
    "lash-rlm-types",
    "lash",
    "lash-default-tools",
    "lash-mode-rlm",
    "lash-mode-standard",
    "lash-plugin-observational-memory",
    "lash-plugin-plan-mode",
    "lash-plugin-prompt-context",
    "lash-plugin-rolling-history",
    "lash-plugin-ui-activity",
    "lash-provider-anthropic",
    "lash-provider-codex",
    "lash-provider-google",
    "lash-provider-openai",
    "lash-providers-builtin",
    "lash-subagents",
    "lash-ui",
    "lash-tui",
    "lash-autoresearch",
    "lash-gepa",
    "lash-cli",
    "lash-export",
    "lash-file-index",
    "lashlang",
    "bench/longcot/runner",
    "bench/longmemeval-rlm/runner",
    "bench/swebench/runner",
]
resolver = "3"

[workspace.package]
version = "0.2.76"
license = "MIT"

[profile.release]
lto = "thin"
strip = true

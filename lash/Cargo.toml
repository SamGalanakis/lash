[package]
name = "lash"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
# Keep core portable by default.
default = []
otel-trace = ["lash-trace/otel"]
# Expose `lash::testing` for downstream plugin crates to share mock
# session-manager/turn fixtures with lash's own tests.
testing = []
# Convenience umbrella for first-party consumers (e.g. lash-cli).
full = []

[dependencies]
lash-sansio = { path = "../lash-sansio" }
lash-trace = { path = "../lash-trace" }
lash-rlm-types = { path = "../lash-rlm-types" }
tokio = { version = "1", features = ["process", "io-util", "sync", "time", "rt", "rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
schemars = { version = "0.8", features = ["derive"] }
jsonschema = "0.18"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
tempfile = "3"
tracing = "0.1"
regex = "1"
reqwest = { version = "0.13", default-features = false, features = ["json", "query", "stream", "rustls"] }
tokio-util = { version = "0.7", features = ["rt"] }
base64 = "0.22"
bytes = "1"
sha2 = "0.10"
chrono = "0.4"
futures-util = "0.3"
libc = "0.2"

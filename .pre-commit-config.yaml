# Managed by prek (https://github.com/j178/prek): `prek install --hook-type pre-commit --hook-type pre-push`
#
# pre-commit = seconds (hygiene + the cheap gates CI's Lint job enforces).
# pre-push  = the expensive workspace-wide lint.
# Tests deliberately stay out of hooks: the full workspace suite is minutes
# long and belongs to the development loop and CI's Test job — a hook that
# slow gets --no-verify'd and rots.
# docs/pagefind is a generated search index; scenarios/ holds replay
# fixtures whose bytes are load-bearing. Neither should be "fixed".
exclude: '^(docs/pagefind/|scenarios/)'
repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      # Mirrors CI Lint "Check formatting" — whole workspace, check-only.
      - id: cargo-fmt-check
        name: cargo fmt --all --check
        language: system
        entry: cargo fmt --all --check
        files: '\.rs$'
        pass_filenames: false

      # Mirrors CI Lint "Check production file-size budget".
      - id: file-size-budget
        name: production file-size budget
        language: system
        entry: bash scripts/check-production-file-size.sh
        files: '\.rs$'
        pass_filenames: false

      # Mirrors CI Lint "Check core/UI boundary".
      - id: core-ui-boundary
        name: core/UI boundary
        language: system
        entry: bash scripts/check-core-ui-boundary.sh
        files: '\.rs$'
        pass_filenames: false

      # Mirrors CI Lint "Clippy (workspace, all targets)". Warm-cache this is
      # tens of seconds; run at push so commits stay instant.
      - id: cargo-clippy-workspace
        name: cargo clippy (workspace, all targets)
        language: system
        entry: cargo clippy --workspace --all-targets -- -D warnings
        files: '\.rs$'
        pass_filenames: false
        stages: [pre-push]

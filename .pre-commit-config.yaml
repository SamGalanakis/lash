repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      # Rust — lash-core (runtime library)
      - id: cargo-fmt-lash-core
        name: cargo fmt (lash-core)
        language: system
        entry: cargo fmt --manifest-path crates/lash-core/Cargo.toml
        files: '^crates/lash-core/.*\.rs$'
        pass_filenames: false

      # Rust — lash (facade)
      - id: cargo-fmt-lash
        name: cargo fmt (lash)
        language: system
        entry: cargo fmt --manifest-path crates/lash/Cargo.toml
        files: '^crates/lash/.*\.rs$'
        pass_filenames: false

      # Rust — lash-cli
      - id: cargo-fmt-cli
        name: cargo fmt (lash-cli)
        language: system
        entry: cargo fmt --manifest-path crates/lash-cli/Cargo.toml
        files: '^crates/lash-cli/.*\.rs$'
        pass_filenames: false

      # Rust clippy — lash-core (runtime library)
      - id: cargo-clippy-lash-core
        name: cargo clippy (lash-core)
        language: system
        entry: cargo clippy --manifest-path crates/lash-core/Cargo.toml -- -D warnings
        files: '^crates/lash-core/.*\.rs$'
        pass_filenames: false

      # Rust clippy — lash (facade)
      - id: cargo-clippy-lash
        name: cargo clippy (lash)
        language: system
        entry: cargo clippy --manifest-path crates/lash/Cargo.toml -- -D warnings
        files: '^crates/lash/.*\.rs$'
        pass_filenames: false

      # Rust clippy — lash-cli
      - id: cargo-clippy-cli
        name: cargo clippy (lash-cli)
        language: system
        entry: cargo clippy --manifest-path crates/lash-cli/Cargo.toml -- -D warnings
        files: '^crates/lash-cli/.*\.rs$'
        pass_filenames: false

      # Rust workspace tests
      - id: cargo-test-workspace
        name: cargo test (workspace)
        language: system
        entry: cargo test --workspace --locked
        files: '^(Cargo\.(toml|lock)|[A-Za-z0-9._-]+/Cargo\.toml|.+\.rs)$'
        pass_filenames: false

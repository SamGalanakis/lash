# Distributed-backend e2e harness: Restate + Postgres + MinIO with two
# workers behind a round-robin proxy.
#
# The e2e binaries are built on the host by scripts/restate-postgres-workers-e2e.sh
# and bind-mounted in; LASH_E2E_BIN_DIR (exported by the script) points at the
# host's target/debug. The runtime image matches the GitHub ubuntu-latest
# runner's glibc, so host-built binaries run unmodified — which also means the
# harness needs a Linux x86_64 host with glibc <= the image's (any current
# Ubuntu works).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lash
      POSTGRES_PASSWORD: lash
      POSTGRES_DB: lash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lash -d lash"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${LASH_E2E_MINIO_PORT:-19000}:9000"
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/lash-attachments
      "

  restate:
    image: restatedev/restate:1.7.0
    environment:
      RESTATE_ADMIN__BIND_PORT: "9070"
      RESTATE_INGRESS__BIND_PORT: "8080"
      RESTATE_BIND_PORT: "5122"

  mock-provider:
    image: ubuntu:24.04
    command: /usr/local/bin/lash-e2e-mock-provider
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MOCK_PROVIDER_PORT: "18001"
      DATABASE_URL: postgres://lash:lash@postgres:5432/lash
    volumes:
      - ${LASH_E2E_BIN_DIR:?run via `just restate-postgres-workers-e2e`}/lash-e2e-mock-provider:/usr/local/bin/lash-e2e-mock-provider:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro

  worker-a:
    image: ubuntu:24.04
    command: /usr/local/bin/lash-e2e-worker
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      restate:
        condition: service_started
    environment:
      WORKER_INSTANCE_ID: worker-a
      WORKER_PORT: "18100"
      LASH_E2E_FAIL_ONCE: "1"
      DATABASE_URL: postgres://lash:lash@postgres:5432/lash
      RESTATE_INGRESS_URL: http://restate:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: lash-attachments
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PREFIX: runbooks/restate-postgres-workers
      MOCK_PROVIDER_BASE_URL: http://mock-provider:18001
      LASH_E2E_TRACE_DIR: /e2e-traces
    volumes:
      - ${LASH_E2E_BIN_DIR:?run via `just restate-postgres-workers-e2e`}/lash-e2e-worker:/usr/local/bin/lash-e2e-worker:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - trace-output:/e2e-traces

  worker-b:
    image: ubuntu:24.04
    command: /usr/local/bin/lash-e2e-worker
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      restate:
        condition: service_started
    environment:
      WORKER_INSTANCE_ID: worker-b
      WORKER_PORT: "18100"
      LASH_E2E_FAIL_ONCE: "1"
      DATABASE_URL: postgres://lash:lash@postgres:5432/lash
      RESTATE_INGRESS_URL: http://restate:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: lash-attachments
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PREFIX: runbooks/restate-postgres-workers
      MOCK_PROVIDER_BASE_URL: http://mock-provider:18001
      LASH_E2E_TRACE_DIR: /e2e-traces
    volumes:
      - ${LASH_E2E_BIN_DIR:?run via `just restate-postgres-workers-e2e`}/lash-e2e-worker:/usr/local/bin/lash-e2e-worker:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - trace-output:/e2e-traces

  worker-proxy:
    image: caddy:2-alpine
    depends_on:
      - worker-a
      - worker-b
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  runner:
    image: ubuntu:24.04
    command: /usr/local/bin/lash-e2e-runner
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      restate:
        condition: service_started
      worker-proxy:
        condition: service_started
      mock-provider:
        condition: service_started
    environment:
      DATABASE_URL: postgres://lash:lash@postgres:5432/lash
      RESTATE_ADMIN_URL: http://restate:9070
      RESTATE_INGRESS_URL: http://restate:8080
      WORKER_DEPLOYMENT_URL: http://worker-proxy:18100
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: lash-attachments
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PREFIX: runbooks/restate-postgres-workers
      MOCK_PROVIDER_BASE_URL: http://mock-provider:18001
      LASH_E2E_TRACE_DIR: /e2e-traces
    volumes:
      - ${LASH_E2E_BIN_DIR:?run via `just restate-postgres-workers-e2e`}/lash-e2e-runner:/usr/local/bin/lash-e2e-runner:ro
      - ${LASH_E2E_BIN_DIR:?run via `just restate-postgres-workers-e2e`}/lash-e2e-frame-crash:/usr/local/bin/lash-e2e-frame-crash:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - trace-output:/e2e-traces
    profiles:
      - runner

volumes:
  trace-output:

[package]
name = "lash-restate-postgres-workers-e2e"
version = "0.0.0"
edition.workspace = true
publish = false
rust-version.workspace = true

[[bin]]
name = "lash-e2e-worker"
path = "src/bin/worker.rs"

[[bin]]
name = "lash-e2e-mock-provider"
path = "src/bin/mock_provider.rs"

[[bin]]
name = "lash-e2e-runner"
path = "src/bin/runner.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = "0.8"
lash-core = { workspace = true }
lash = { workspace = true }
lash-postgres-store = { workspace = true }
lash-provider-openai = { workspace = true }
lash-restate = { workspace = true }
lash-s3-store = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
restate-sdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "postgres"] }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = "0.3"

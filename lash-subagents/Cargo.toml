[package]
name = "lash-subagents"
version.workspace = true
edition = "2024"
license.workspace = true

[dependencies]
lash-core = { path = "../lash-core", default-features = false }
lash-llm-tools = { path = "../lash-llm-tools" }
lash-mode-rlm = { path = "../lash-mode-rlm" }
lash-rlm-types = { path = "../lash-rlm-types" }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { path = "../lash-core", default-features = false, features = ["testing"] }

[package]
name = "lash-subagents"
version.workspace = true
edition = "2024"
license.workspace = true

[dependencies]
lash = { path = "../lash", default-features = false }
lash-llm-tools = { path = "../lash-llm-tools" }
lash-mode-rlm = { path = "../lash-mode-rlm" }
lash-rlm-types = { path = "../lash-rlm-types" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
lash = { path = "../lash", default-features = false, features = ["testing"] }

[package]
name = "lash-mode-rlm"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
default = []
# Enables the hybrid/regex-ranked `search_tools` backend (depends on
# lash's `sqlite-store` feature for the underlying search machinery).
# Without it, `search_tools` falls back to a simpler substring filter.
sqlite-store = ["lash/sqlite-store"]

[dependencies]
lash = { path = "../lash" }
lash-sansio = { path = "../lash-sansio" }
lashlang = { path = "../lashlang" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
lash-mode-standard = { path = "../lash-mode-standard" }
tokio = { version = "1", features = ["full"] }

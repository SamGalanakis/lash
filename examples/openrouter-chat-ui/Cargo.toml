[package]
name = "openrouter-chat-ui"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[dependencies]
async-trait = "0.1"
axum = "0.8"
bytes = "1"
chrono = "0.4"
lash = { path = "../../lash" }
lash-sqlite-store = { path = "../../lash-sqlite-store" }
lash-embed = { path = "../../lash-embed" }
lash-provider-openai = { path = "../../lash-provider-openai" }
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }

[package]
name = "agent-service"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
axum = "0.8"
bytes = { workspace = true }
chrono = { workspace = true }
dotenvy = "0.15"
futures-util = { workspace = true }
lash-restate = { workspace = true, optional = true }
lash-remote-protocol = { workspace = true }
lash-protocol-rlm = { workspace = true }
lash-sqlite-store = { workspace = true }
lash = { workspace = true, features = ["rlm"] }
lash-provider-openai = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls", "http2"], optional = true }
restate-sdk = { workspace = true, optional = true }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "signal", "sync", "time"] }
tokio-stream = "0.1"
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash = { workspace = true, features = ["rlm", "testing"] }
tempfile = { workspace = true }

[features]
restate = ["dep:lash-restate", "dep:reqwest", "dep:restate-sdk"]

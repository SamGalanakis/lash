[package]
name = "agent-service"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false

[dependencies]
async-trait = { workspace = true }
axum = "0.8"
bytes = { workspace = true }
chrono = { workspace = true }
lash-restate = { workspace = true, optional = true }
lash-turso-store = { workspace = true }
lash = { workspace = true }
lash-provider-openai = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls", "http2"], optional = true }
restate-sdk = { workspace = true, optional = true }
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "sync", "time"] }
tokio-stream = "0.1"
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
tempfile = { workspace = true }

[features]
restate = ["dep:lash-restate", "dep:reqwest", "dep:restate-sdk"]

[package]
name = "agent-workbench"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = "0.8"
base64 = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
chrono-tz = { workspace = true }
croner = { workspace = true }
dotenvy = "0.15"
futures-util = { workspace = true }
lash = { workspace = true, features = ["rlm"] }
lash-core = { workspace = true }
lashlang = { workspace = true }
lash-plugin-process-controls = { workspace = true, features = ["lashlang"] }
lash-protocol-rlm = { workspace = true }
lash-provider-openai = { workspace = true }
lash-postgres-store = { workspace = true }
lash-restate = { workspace = true }
lash-remote-protocol = { workspace = true }
lash-sqlite-store = { workspace = true }
lash-subagents = { workspace = true }
lash-tools = { path = "../../crates/lash-tools", default-features = false, features = ["lashlang"] }
reqwest = { workspace = true, features = ["json", "rustls", "http2"] }
restate-sdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread", "sync", "time"] }
tokio-stream = "0.1"
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-lashlang-runtime = { workspace = true }
lash-llm-tools = { workspace = true }
lash = { workspace = true, features = ["rlm", "testing"] }
lash-core = { workspace = true }
lash-remote-protocol = { workspace = true, features = ["core-conversions"] }
rusqlite = { version = "0.37", features = ["bundled"] }
sqlx = { workspace = true }
tempfile = { workspace = true }

[features]
default = []

[package]
name = "agent-workbench"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
rust-version.workspace = true
publish = false

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = "0.8"
bytes = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
chrono-tz = { workspace = true }
croner = { workspace = true }
dotenvy = "0.15"
lash = { workspace = true }
lashlang = { workspace = true }
lash-plugin-process-controls = { workspace = true }
lash-provider-openai = { workspace = true }
lash-restate = { workspace = true }
lash-sqlite-store = { workspace = true }
lash-subagents = { workspace = true }
lash-tools = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls", "http2"] }
restate-sdk = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio-util = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread", "sync", "time"] }
tokio-stream = "0.1"
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
lash-core = { workspace = true, features = ["testing"] }
lash = { workspace = true, features = ["testing"] }

[package]
name = "lash-tool-support"
version.workspace = true
edition = "2024"
license.workspace = true

[features]
default = []

[dependencies]
lash = { path = "../lash", default-features = false }
lash-rlm-types = { path = "../lash-rlm-types" }
tokio = { version = "1", features = ["rt"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
ignore = "0.4"
similar = "2"
